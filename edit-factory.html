<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script>(function(){try{var l=localStorage.getItem('sonnaLang');if(l==='en'){document.documentElement.lang='en';document.documentElement.dir='ltr';}else if(l==='ar'){document.documentElement.lang='ar';document.documentElement.dir='rtl';}var th=localStorage.getItem('sonnaTheme');if(!th){th='light';}document.documentElement.setAttribute('data-theme',th);}catch(e){}})();</script>
<title>تعديل مصنعي | صُنّاع</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Alexandria:wght@400;500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=Cairo:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="icon" type="image/png" href="assets/favicon.png">
<link rel="apple-touch-icon" href="assets/favicon.png">
<link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

<div id="app"></div>

<script src="assets/js/icons.js"></script>
<script src="assets/js/lang.js"></script>
<script src="assets/js/data.js"></script>
<script src="assets/js/supabase-config.js"></script>
<script src="assets/js/store.js"></script>
<script src="assets/js/utils.js"></script>
<script src="assets/js/auth.js"></script>
<script src="assets/js/components.js"></script>
<script src="assets/js/chat.js"></script>
<script>
var EDIT = null;   // { id, data, logo, cover, media, productMedia }
var TAGS = {};     // tag-input arrays keyed e.g. 'prod_en'
var CERT_SEL = []; // selected certifications (predefined + custom)
var HOURS = { days: [], open: '', close: '' };

var DAYS = [['sat','Sat','السبت'],['sun','Sun','الأحد'],['mon','Mon','الإثنين'],['tue','Tue','الثلاثاء'],['wed','Wed','الأربعاء'],['thu','Thu','الخميس'],['fri','Fri','الجمعة']];

function shell(body) { document.getElementById('app').innerHTML = headerHTML() + mobileMenuHTML() + '<main>' + body + '</main>' + footerHTML(); }
function field(label, inner) { return '<div class="form-field full"><label>' + label + '</label>' + inner + '</div>'; }
function half(label, inner) { return '<div class="form-field"><label>' + label + '</label>' + inner + '</div>'; }
function val(id) { var e = document.getElementById(id); return e ? e.value.trim() : ''; }

/* ---------- Tag inputs (Products / Capabilities / Services) ---------- */
function tagInit(key, arr) { TAGS[key] = (arr || []).slice(); }
function tagChipsHTML(key) {
  return (TAGS[key] || []).map(function (v, i) {
    return '<span class="tag-chip">' + esc(v) + '<button type="button" onclick="tagRemove(\'' + key + '\',' + i + ')" aria-label="remove">' + ICONS.close + '</button></span>';
  }).join('');
}
function tagWidget(key, label, dir, ph) {
  return '<div class="form-field">' +
    '<label>' + label + '</label>' +
    '<div class="tag-chips" id="tagchips_' + key + '">' + tagChipsHTML(key) + '</div>' +
    '<div class="tag-add">' +
      '<input id="taginput_' + key + '" maxlength="60"' + (dir ? ' dir="' + dir + '"' : '') + ' placeholder="' + esc(ph) + '" onkeydown="tagKey(event,\'' + key + '\')">' +
      '<button type="button" class="btn btn-ghost btn-sm" onclick="tagAdd(\'' + key + '\')">' + t('ef_add') + '</button>' +
    '</div></div>';
}
function tagAdd(key) {
  var el = document.getElementById('taginput_' + key); if (!el) return;
  var v = el.value.trim(); if (!v) return;
  TAGS[key] = TAGS[key] || [];
  if (TAGS[key].length >= 40) { el.value = ''; return; }
  if (TAGS[key].indexOf(v) < 0) TAGS[key].push(v);
  el.value = '';
  document.getElementById('tagchips_' + key).innerHTML = tagChipsHTML(key);
  el.focus();
}
function tagRemove(key, i) { TAGS[key].splice(i, 1); document.getElementById('tagchips_' + key).innerHTML = tagChipsHTML(key); }
function tagKey(e, key) { if (e.key === 'Enter') { e.preventDefault(); tagAdd(key); } }

/* ---------- Certifications (predefined toggles + custom) ---------- */
function certsInit(arr) { CERT_SEL = (arr || []).slice(); }
function certsRender() {
  var predefined = CERTS.map(function (c, ix) {
    var on = CERT_SEL.indexOf(c) >= 0;
    return '<button type="button" class="cert-chip' + (on ? ' on' : '') + '" onclick="certToggle(' + ix + ')">' + esc(c) + '</button>';
  }).join('');
  var custom = CERT_SEL.filter(function (c) { return CERTS.indexOf(c) < 0; });
  var customHTML = custom.map(function (c, i) {
    return '<span class="cert-chip on custom">' + esc(c) + '<button type="button" onclick="certRemoveCustom(' + i + ')" aria-label="remove">' + ICONS.close + '</button></span>';
  }).join('');
  return '<div class="chip-row">' + predefined + customHTML + '</div>' +
    '<div class="tag-add" style="margin-top:12px">' +
      '<input id="certInput" maxlength="40" placeholder="' + esc(t('ef_cert_custom_ph')) + '" onkeydown="certKey(event)">' +
      '<button type="button" class="btn btn-ghost btn-sm" onclick="certAddCustom()">' + t('ef_add') + '</button>' +
    '</div>';
}
function certsRefresh(focus) {
  var el = document.getElementById('e_certs'); if (el) el.innerHTML = certsRender();
  if (focus) { var i = document.getElementById('certInput'); if (i) i.focus(); }
}
function certToggle(ix) {
  var c = CERTS[ix]; var i = CERT_SEL.indexOf(c);
  if (i >= 0) CERT_SEL.splice(i, 1); else CERT_SEL.push(c);
  certsRefresh(false);
}
function certAddCustom() {
  var el = document.getElementById('certInput'); if (!el) return;
  var v = el.value.trim(); if (!v) return;
  if (CERT_SEL.indexOf(v) < 0) CERT_SEL.push(v);
  el.value = '';
  certsRefresh(true);
}
function certRemoveCustom(i) {
  var custom = CERT_SEL.filter(function (c) { return CERTS.indexOf(c) < 0; });
  var target = custom[i]; var ix = CERT_SEL.indexOf(target);
  if (ix >= 0) CERT_SEL.splice(ix, 1);
  certsRefresh(false);
}
function certKey(e) { if (e.key === 'Enter') { e.preventDefault(); certAddCustom(); } }

/* ---------- Working hours (days + open/close) ---------- */
function hoursInit(h) {
  if (h && (Array.isArray(h.days) || h.open || h.close)) {
    HOURS = { days: (h.days || []).slice(), open: h.open || '', close: h.close || '' };
  } else {
    HOURS = { days: ['sun', 'mon', 'tue', 'wed', 'thu'], open: '09:00', close: '17:00' };
  }
}
function hoursRender() {
  return '<div class="hours-days">' + DAYS.map(function (d) {
    var on = HOURS.days.indexOf(d[0]) >= 0;
    return '<button type="button" class="day-chip' + (on ? ' on' : '') + '" onclick="hoursToggleDay(\'' + d[0] + '\')">' + (LANG === 'ar' ? d[2] : d[1]) + '</button>';
  }).join('') + '</div>' +
  '<div class="hours-times form-grid">' +
    '<div class="form-field"><label>' + t('ef_open') + '</label><input type="time" id="e_open" value="' + esc(HOURS.open) + '"></div>' +
    '<div class="form-field"><label>' + t('ef_close') + '</label><input type="time" id="e_close" value="' + esc(HOURS.close) + '"></div>' +
  '</div>';
}
function hoursCaptureTimes() {
  var o = document.getElementById('e_open'), c = document.getElementById('e_close');
  if (o) HOURS.open = o.value; if (c) HOURS.close = c.value;
}
function hoursToggleDay(d) {
  hoursCaptureTimes();
  var i = HOURS.days.indexOf(d);
  if (i >= 0) HOURS.days.splice(i, 1); else HOURS.days.push(d);
  document.getElementById('e_hours').innerHTML = hoursRender();
}

/* ---------- Media (factory photos + product photos) ---------- */
function mediaPreviews(key) {
  var m = EDIT[key] || [];
  if (!m.length) return '<p class="muted" style="font-size:13px">' + t('ef_no_media') + '</p>';
  return '<div class="gallery">' + m.map(function (x, i) {
    var inner = x.type === 'video'
      ? '<video src="' + encodeURI(x.url) + '" style="width:100%;height:100%;object-fit:cover"></video>'
      : '<span style="background-image:url(\'' + safeUrl(x.url) + '\');background-size:cover;background-position:center;position:absolute;inset:0"></span>';
    return '<div class="ph" style="position:relative">' + inner +
      '<button type="button" class="media-del" onclick="removeMedia(\'' + key + '\',' + i + ')" aria-label="remove">' + ICONS.close + '</button></div>';
  }).join('') + '</div>';
}
function refreshMedia(key) { var el = document.getElementById('wrap_' + key); if (el) el.innerHTML = mediaPreviews(key); }
function removeMedia(key, i) { EDIT[key].splice(i, 1); refreshMedia(key); }
function onMediaFor(input, key) {
  var files = Array.prototype.slice.call(input.files || []);
  if (!files.length) return;
  var note = document.getElementById('note_' + key);
  var lim = window.PLAN_LIMITS || { mediaImages: 10, mediaVideos: 2 };
  var cur = EDIT[key] || [];
  var roomImg = Math.max(0, lim.mediaImages - cur.filter(function (x) { return x.type !== 'video'; }).length);
  var roomVid = Math.max(0, lim.mediaVideos - cur.filter(function (x) { return x.type === 'video'; }).length);
  var accepted = [], trimmed = false;
  files.forEach(function (f) {
    var isVid = f.type && f.type.indexOf('video') === 0;
    if (isVid) { if (roomVid > 0) { accepted.push(f); roomVid--; } else trimmed = true; }
    else { if (roomImg > 0) { accepted.push(f); roomImg--; } else trimmed = true; }
  });
  if (!accepted.length) {
    input.value = '';
    alert(t('limit_media_title') + '\n' + t('limit_media_msg').replace('{i}', lim.mediaImages).replace('{v}', lim.mediaVideos));
    return;
  }
  if (note) note.textContent = t('ef_uploading');
  Promise.all(accepted.map(function (f) {
    return Auth.uploadFactoryMedia(f).then(function (url) { return { url: url, type: (f.type && f.type.indexOf('video') === 0) ? 'video' : 'image' }; });
  })).then(function (items) {
    EDIT[key] = (EDIT[key] || []).concat(items); refreshMedia(key);
    if (note) note.textContent = '';
    input.value = '';
    if (trimmed) alert(t('limit_media_title') + '\n' + t('limit_media_msg').replace('{i}', lim.mediaImages).replace('{v}', lim.mediaVideos));
  }).catch(function (e) { if (note) note.textContent = (e.message || e); });
}
function onLogo(input) { uploadInto(input, function (url) { EDIT.logo = url; var b = document.getElementById('logoPrev'); if (b) b.style.backgroundImage = 'url(\'' + url + '\')'; }); }
function onCover(input) { uploadInto(input, function (url) { EDIT.cover = url; var b = document.getElementById('coverPrev'); if (b) b.style.backgroundImage = 'url(\'' + url + '\')'; }); }
function uploadInto(input, cb) {
  var f = input.files && input.files[0]; if (!f) return;
  Auth.uploadFactoryMedia(f).then(cb).catch(function (e) { alert('Upload failed: ' + (e.message || e)); });
}

function mediaPanel(key, title, hint) {
  return '<div class="panel" style="margin-bottom:16px"><h2>' + title + '</h2>' +
    '<p class="muted" style="font-size:12.5px;margin-bottom:10px">' + hint + '</p>' +
    '<input type="file" accept="image/*,video/*" multiple onchange="onMediaFor(this,\'' + key + '\')">' +
    '<div class="muted" id="note_' + key + '" style="font-size:12px;margin:4px 0"></div>' +
    '<div id="wrap_' + key + '">' + mediaPreviews(key) + '</div></div>';
}

function renderEditor(fac) {
  var d = fac.data || {};
  EDIT = { id: fac.id, data: d, logo: d.logo || '', cover: d.cover || '', media: (d.media || []).slice(), productMedia: (d.productMedia || []).slice() };
  var name = d.name || { en: fac.name || '', ar: fac.name || '' };
  var sectorOpts = INDUSTRIES.map(function (s) { return '<option value="' + esc(s.id) + '"' + (s.id === fac.sector ? ' selected' : '') + '>' + esc(L({ en: s.en, ar: s.ar })) + '</option>'; }).join('');
  var govOpts = GOVS.map(function (g, ix) { return '<option value="' + ix + '"' + (ix === fac.gov ? ' selected' : '') + '>' + esc(L(g)) + '</option>'; }).join('');
  var svc = d.services || { en: [], ar: [] };
  var prod = d.products || { en: [], ar: [] };
  var caps = d.capabilities || { en: [], ar: [] };

  tagInit('prod_en', prod.en); tagInit('prod_ar', prod.ar);
  tagInit('cap_en', caps.en); tagInit('cap_ar', caps.ar);
  tagInit('svc_en', Array.isArray(svc.en) ? svc.en : []); tagInit('svc_ar', Array.isArray(svc.ar) ? svc.ar : []);
  certsInit(d.certs);
  hoursInit(d.hours);

  function listPanel(title, hint, key) {
    return '<div class="panel" style="margin-bottom:16px"><h2>' + title + '</h2>' +
      '<p class="muted" style="font-size:12.5px;margin-bottom:12px">' + hint + '</p>' +
      '<div class="form-grid">' +
        tagWidget(key + '_en', t('lang_en') + ' (EN)', '', t('ef_tag_ph')) +
        tagWidget(key + '_ar', t('lang_ar') + ' (ع)', 'rtl', t('ef_tag_ph')) +
      '</div></div>';
  }

  shell(
    '<div class="container" style="max-width:820px;padding:24px 24px 80px">' +
      '<a href="my-factory.html" class="back-btn">' + (LANG === 'ar' ? '→' : '←') + ' ' + t('fac_view') + '</a>' +
      '<h1 style="font-size:24px;font-weight:800;margin:8px 0 4px">' + t('ef_title') + '</h1>' +
      '<p class="muted" style="margin-bottom:18px">' + t('ef_sub') + '</p>' +
      '<div class="au-err" id="efErr" style="display:none"></div>' +

      '<div class="panel" style="margin-bottom:16px"><h2>' + t('ef_basics') + '</h2><div class="form-grid">' +
        half(t('fac_name') + ' (EN)', '<input id="e_name_en" maxlength="80" value="' + esc(name.en || '') + '">') +
        half(t('fac_name') + ' (ع)', '<input id="e_name_ar" dir="rtl" maxlength="80" value="' + esc(name.ar || '') + '">') +
        half(t('fac_sector'), '<select id="e_sector">' + sectorOpts + '</select>') +
        half(t('fac_location'), '<select id="e_gov">' + govOpts + '</select>') +
        half(t('established'), '<input id="e_yr" type="number" min="1900" max="2100" value="' + esc(d.yr || '') + '">') +
        half(t('employees'), '<input id="e_emp" type="number" min="0" inputmode="numeric" value="' + esc(d.emp || '') + '">') +
        half(t('moq'), '<input id="e_moq" type="number" min="0" value="' + esc(d.moq || '') + '">') +
        half(t('ef_export'), '<label class="cert-chip' + (d.exp ? ' on' : '') + '" style="margin-top:6px"><input id="e_exp" type="checkbox"' + (d.exp ? ' checked' : '') + '> ' + t('exports') + '</label>') +
        half(t('daily_capacity'), '<input id="e_daily" type="number" min="0" value="' + esc(d.dailyCapacity || '') + '">') +
        half(t('monthly_capacity'), '<input id="e_monthly" type="number" min="0" value="' + esc(d.monthlyCapacity || '') + '">') +
        field(t('about') + ' (EN) <span class="opt">' + t('ef_max_about') + '</span>', '<textarea id="e_desc_en" rows="3" maxlength="600">' + esc(d.desc && d.desc.en || '') + '</textarea>') +
        field(t('about') + ' (ع) <span class="opt">' + t('ef_max_about') + '</span>', '<textarea id="e_desc_ar" dir="rtl" rows="3" maxlength="600">' + esc(d.desc && d.desc.ar || '') + '</textarea>') +
        field(t('ef_keywords'), '<input id="e_keywords" maxlength="200" value="' + esc(d.keywords || '') + '">') +
      '</div></div>' +

      '<div class="panel" style="margin-bottom:16px"><h2>' + t('certifications') + '</h2>' +
        '<p class="muted" style="font-size:12.5px;margin-bottom:12px">' + t('ef_cert_hint') + '</p>' +
        '<div id="e_certs">' + certsRender() + '</div></div>' +

      listPanel(t('products'), t('ef_products_hint'), 'prod') +
      listPanel(t('capabilities'), t('ef_caps_hint'), 'cap') +
      listPanel(t('services_title'), t('ef_svc_hint'), 'svc') +

      '<div class="panel" style="margin-bottom:16px"><h2>' + t('contact_title') + '</h2><div class="form-grid">' +
        half(t('call'), '<input id="e_phone" dir="ltr" value="' + esc(d.phone || '') + '">') +
        half(t('whatsapp'), '<input id="e_whatsapp" dir="ltr" value="' + esc(d.whatsapp || '') + '">') +
        half(t('email'), '<input id="e_email" dir="ltr" value="' + esc(d.email || '') + '">') +
        half(t('website'), '<input id="e_website" dir="ltr" value="' + esc(d.website || '') + '">') +
        half('Facebook', '<input id="e_facebook" dir="ltr" value="' + esc(d.facebook || '') + '">') +
        half('Instagram', '<input id="e_instagram" dir="ltr" value="' + esc(d.instagram || '') + '">') +
        half('LinkedIn', '<input id="e_linkedin" dir="ltr" value="' + esc(d.linkedin || '') + '">') +
      '</div></div>' +

      '<div class="panel" style="margin-bottom:16px"><h2>' + t('hours') + '</h2>' +
        '<p class="muted" style="font-size:12.5px;margin-bottom:12px">' + t('ef_hours_hint') + '</p>' +
        '<div id="e_hours">' + hoursRender() + '</div></div>' +

      '<div class="panel" style="margin-bottom:16px"><h2>' + t('ef_branding') + '</h2><div class="form-grid">' +
        field(t('ef_logo'), '<div class="media-pick"><div class="media-thumb" id="logoPrev" style="background-image:url(\'' + safeUrl(EDIT.logo) + '\')"></div><input type="file" accept="image/*" onchange="onLogo(this)"></div>') +
        field(t('ef_cover'), '<div class="media-pick"><div class="media-thumb wide" id="coverPrev" style="background-image:url(\'' + safeUrl(EDIT.cover) + '\')"></div><input type="file" accept="image/*" onchange="onCover(this)"></div>') +
      '</div></div>' +

      mediaPanel('productMedia', t('ef_product_photos'), t('ef_product_photos_hint')) +
      mediaPanel('media', t('ef_factory_photos'), t('ef_factory_photos_hint')) +

      '<div style="display:flex;gap:10px;justify-content:flex-end">' +
        '<a class="btn btn-ghost" href="my-factory.html">' + t('cancel') + '</a>' +
        '<button class="btn btn-primary" id="e_save" onclick="saveFactory()">' + t('ef_save') + '</button>' +
      '</div>' +
    '</div>'
  );
}

function saveFactory() {
  var showErr = function (m) { var e = document.getElementById('efErr'); e.textContent = m; e.style.display = 'block'; window.scrollTo(0, 0); };
  var nameEn = val('e_name_en'), nameAr = val('e_name_ar');
  if (!nameEn || !nameAr) { showErr(t('ef_need_name')); return; }
  hoursCaptureTimes();
  var d = Object.assign({}, EDIT.data, {
    name: { en: nameEn, ar: nameAr },
    desc: { en: val('e_desc_en'), ar: val('e_desc_ar') },
    yr: Number(val('e_yr')) || 0, moq: Number(val('e_moq')) || 0, emp: Number(val('e_emp')) || 0,
    phone: val('e_phone'), exp: document.getElementById('e_exp').checked, certs: CERT_SEL.slice(),
    dailyCapacity: Number(val('e_daily')) || 0, monthlyCapacity: Number(val('e_monthly')) || 0,
    products: { en: (TAGS.prod_en || []).slice(), ar: (TAGS.prod_ar || []).slice() },
    capabilities: { en: (TAGS.cap_en || []).slice(), ar: (TAGS.cap_ar || []).slice() },
    services: { en: (TAGS.svc_en || []).slice(), ar: (TAGS.svc_ar || []).slice() },
    hours: { days: HOURS.days.slice(), open: HOURS.open || '', close: HOURS.close || '' }, keywords: val('e_keywords'),
    whatsapp: val('e_whatsapp'), email: val('e_email'), website: val('e_website'),
    facebook: val('e_facebook'), instagram: val('e_instagram'), linkedin: val('e_linkedin'),
    logo: EDIT.logo || '', cover: EDIT.cover || '', media: EDIT.media || [], productMedia: EDIT.productMedia || []
  });
  var sector = document.getElementById('e_sector').value;
  var gov = Number(document.getElementById('e_gov').value);
  var btn = document.getElementById('e_save'); btn.disabled = true; btn.textContent = '…';
  Auth.updateMyFactory(EDIT.id, { name: nameEn, sector: sector, gov: gov, data: d })
    .then(function () { toast(t('ef_saved')); setTimeout(function () { window.location.href = 'my-factory.html'; }, 600); })
    .catch(function (e) { btn.disabled = false; btn.textContent = t('ef_save'); showErr((e.message || e)); });
}

document.addEventListener('DOMContentLoaded', function () {
  var savedLang = localStorage.getItem('sonnaLang');
  if (savedLang === 'en' || savedLang === 'ar') LANG = savedLang;
  document.documentElement.lang = LANG;
  document.documentElement.dir = LANG === 'ar' ? 'rtl' : 'ltr';
  if (!window.Auth || !Auth.isLoggedIn()) { shell(Auth.gateHTML()); return; }
  AdminStore.bootstrap().then(function () {
    Auth.myFactory().then(function (fac) {
      if (!fac) { shell('<div class="container" style="padding:64px 24px;text-align:center"><p class="muted">' + t('mf_no_factory') + '</p><a class="btn btn-primary" style="margin-top:14px" href="account.html">' + t('fac_create') + '</a></div>'); return; }
      if (!fac.verified) { shell('<div class="container" style="padding:64px 24px;text-align:center;max-width:520px"><p class="muted">' + t('ef_verify_first') + '</p><a class="btn btn-primary" style="margin-top:14px" href="my-factory.html">' + t('fac_view') + '</a></div>'); return; }
      renderEditor(fac);
    });
  });
});
</script>
</body>
</html>
