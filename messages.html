<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script>(function(){try{var l=localStorage.getItem('sonnaLang');if(l==='en'){document.documentElement.lang='en';document.documentElement.dir='ltr';}else if(l==='ar'){document.documentElement.lang='ar';document.documentElement.dir='rtl';}}catch(e){}})();</script>
<title>الرسائل | صُنّاع</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Alexandria:wght@400;500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=Cairo:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

<div id="app"></div>

<script src="assets/js/icons.js"></script>
<script src="assets/js/lang.js"></script>
<script src="assets/js/data.js"></script>
<script src="assets/js/supabase-config.js"></script>
<script src="assets/js/store.js"></script>
<script src="assets/js/utils.js"></script>
<script src="assets/js/auth.js"></script>
<script src="assets/js/components.js"></script>
<script src="assets/js/chat.js"></script>
<script>
function shell(body) { document.getElementById('app').innerHTML = headerHTML() + mobileMenuHTML() + '<main>' + body + '</main>' + footerHTML(); }

function threadRow(th) {
  var when = new Date(th.last.created_at).toLocaleString();
  var preview = th.last.body || '';
  if (preview.length > 80) preview = preview.slice(0, 80) + '…';
  var nameAttr = esc(String(th.otherName || 'User')).replace(/'/g, '&#39;');
  return '<button class="thread-row" onclick="Chat.openWith(\'' + esc(th.otherId) + '\',\'' + nameAttr + '\')">' +
    '<span class="thread-avatar">' + esc(String(th.otherName || 'U').charAt(0).toUpperCase()) + '</span>' +
    '<span class="thread-body">' +
      '<span class="thread-top"><b>' + esc(th.otherName || 'User') + '</b>' + (th.unread ? '<span class="thread-unread">' + th.unread + '</span>' : '') + '</span>' +
      '<span class="thread-preview">' + (th.last.request_title ? '<span class="chat-ref-inline">' + ICONS.clipboard + ' ' + esc(th.last.request_title) + '</span> ' : '') + esc(preview) + '</span>' +
    '</span>' +
    '<span class="thread-time">' + esc(when) + '</span>' +
  '</button>';
}

function renderMessages() {
  if (!window.Auth || !Auth.isLoggedIn()) { shell(Auth.gateHTML()); return; }
  shell('<div class="container" style="max-width:720px;padding:28px 24px">' +
    '<h1 style="font-size:24px;font-weight:800;margin-bottom:16px">' + t('nav_messages') + '</h1>' +
    '<div id="threadList"><div class="muted" style="padding:30px;text-align:center">…</div></div>' +
  '</div>');

  Chat.threads().then(function (threads) {
    var el = document.getElementById('threadList');
    if (!el) return;
    el.innerHTML = threads.length
      ? threads.map(threadRow).join('')
      : '<div class="empty"><div class="big">' + ICONS.chat + '</div><b>' + t('msg_empty') + '</b><p>' + t('msg_empty_sub') + '</p></div>';
    if (window.updateChatBadge) updateChatBadge();
  }).catch(function (e) {
    var el = document.getElementById('threadList');
    if (el) el.innerHTML = '<div class="muted" style="padding:30px;text-align:center">' + esc(e.message || e) + '</div>';
  });
}

document.addEventListener('DOMContentLoaded', function () {
  var savedLang = localStorage.getItem('sonnaLang');
  if (savedLang === 'en' || savedLang === 'ar') LANG = savedLang;
  document.documentElement.lang = LANG;
  document.documentElement.dir = LANG === 'ar' ? 'rtl' : 'ltr';
  renderMessages();
  // Refresh the list periodically so new conversations/unread counts appear.
  setInterval(function () {
    if (!document.querySelector('.chat-backdrop') && window.Chat && Auth.isLoggedIn()) {
      Chat.threads().then(function (threads) {
        var el = document.getElementById('threadList');
        if (el && threads.length) el.innerHTML = threads.map(threadRow).join('');
      }).catch(function () {});
    }
  }, 8000);
});
</script>
</body>
</html>
