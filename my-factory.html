<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script>(function(){try{var l=localStorage.getItem('sonnaLang');if(l==='en'){document.documentElement.lang='en';document.documentElement.dir='ltr';}else if(l==='ar'){document.documentElement.lang='ar';document.documentElement.dir='rtl';}}catch(e){}})();</script>
<title>صفحة مصنعي | صُنّاع</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Alexandria:wght@400;500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=Cairo:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

<div id="app"></div>

<script src="assets/js/icons.js"></script>
<script src="assets/js/lang.js"></script>
<script src="assets/js/data.js"></script>
<script src="assets/js/supabase-config.js"></script>
<script src="assets/js/store.js"></script>
<script src="assets/js/utils.js"></script>
<script src="assets/js/auth.js"></script>
<script src="assets/js/components.js"></script>
<script src="assets/js/chat.js"></script>
<script>
var MY_FAC = null;

function lockedPanel(title) {
  return '<div class="panel locked-panel"><h2>' + title + '</h2>' +
    '<div class="lock-note">' + ICONS.clock + ' ' + t('mf_locked_note') + '</div></div>';
}

function verifyBox(fac) {
  if (fac.verified) {
    return '<div class="panel verify-cta"><span class="chip teal">' + ICONS.check + ' ' + t('acc_verified') + '</span></div>';
  }
  if (fac.verification_requested) {
    return '<div class="panel">' +
      '<div class="lock-note" style="color:var(--ink)">' + ICONS.clock + ' <b>' + t('mf_req_done') + '</b></div>' +
      '<p class="muted" style="margin-top:8px">' + t('ver_requested_note') + '</p></div>';
  }
  return '<div class="panel verify-cta">' +
    '<h2>' + t('ver_title') + '</h2>' +
    '<p style="margin-top:6px">' + t('ver_intro') + '</p>' +
    '<ul class="verify-benefits">' +
      '<li>' + ICONS.check + ' ' + t('ver_b1') + '</li>' +
      '<li>' + ICONS.check + ' ' + t('ver_b2') + '</li>' +
      '<li>' + ICONS.check + ' ' + t('ver_b3') + '</li>' +
      '<li>' + ICONS.check + ' ' + t('ver_b4') + '</li>' +
    '</ul>' +
    '<button class="btn btn-primary" onclick="openVerifyForm()">' + t('ver_submit') + '</button>' +
  '</div>';
}

function shell(body) { document.getElementById('app').innerHTML = headerHTML() + mobileMenuHTML() + '<main>' + body + '</main>' + footerHTML(); }

// Once an admin verifies the factory (and fills in its details from the control
// panel), the owner should see the real published profile here — not the locked
// placeholders. Build the runtime factory from the saved row and render it.
function nonEmptyList(o) { return o && ((o.en && o.en.length) || (o.ar && o.ar.length)); }
function verifiedFactoryHTML(fac) {
  var f = AdminStore.rowToFactory(fac);
  var i = ind(f.industry);
  var svcNames = L(nonEmptyList(f.services) ? f.services : { en: [], ar: [] });
  var prodList = nonEmptyList(f.products) ? f.products : (IND_PRODUCTS[f.industry] || { en: [], ar: [] });
  var capList = nonEmptyList(f.capabilities) ? f.capabilities : (IND_CAPS[f.industry] || { en: [], ar: [] });
  var hoursTxt = (f.hours && (f.hours.en || f.hours.ar)) ? L(f.hours) : t('hours_val');
  var waNum = (f.whatsapp || f.phone || '').replace(/[^0-9]/g, '');

  var contact = '<div class="panel"><h2>' + t('contact_title') + '</h2>' +
    (f.phone ? '<a class="contact-btn" href="tel:' + esc(f.phone.replace(/\s/g, '')) + '"><span class="ci" style="background:var(--teal-tint)">' + ICONS.phone + '</span><span>' + t('call') + '<small dir="ltr">' + esc(f.phone) + '</small></span></a>' : '') +
    (waNum ? '<a class="contact-btn" href="https://wa.me/' + waNum + '" target="_blank"><span class="ci" style="background:#E7F6EC">' + ICONS.chat + '</span><span>' + t('whatsapp') + '<small dir="ltr">' + esc(f.whatsapp || f.phone) + '</small></span></a>' : '') +
    (f.email ? '<a class="contact-btn" href="mailto:' + esc(f.email) + '"><span class="ci" style="background:#FDF0E0">' + ICONS.envelope + '</span><span>' + t('email') + '<small dir="ltr">' + esc(f.email) + '</small></span></a>' : '') +
    (f.website ? '<a class="contact-btn" href="' + (/^https?:\/\//.test(f.website) ? esc(f.website) : 'https://' + esc(f.website)) + '" target="_blank"><span class="ci" style="background:#E8EEFB">' + ICONS.globe + '</span><span>' + t('website') + '<small dir="ltr">' + esc(f.website) + '</small></span></a>' : '') +
    '</div>';

  return '<div class="container" style="margin-top:14px">' +
      '<div class="au-err" style="background:var(--teal-tint);color:var(--teal);margin-bottom:14px">' + ICONS.check + ' ' + t('mf_verified_banner') + '</div>' +
      '<div class="profile-cover" style="' + (f.cover ? 'background:#0000;background-image:url(\'' + f.cover + '\');background-size:cover;background-position:center' : 'background:' + grad(i.g)) + ';border-radius:20px">' +
        '<span class="pcode">' + factoryCode(f) + '</span>' + (f.cover ? '' : '<span class="cover-ic">' + i.icon + '</span>') +
      '</div>' +
      '<div class="profile-top"><div class="profile-card">' +
        (f.logo ? '<div class="profile-logo" style="background-image:url(\'' + f.logo + '\');background-size:cover;background-position:center"></div>' : '<div class="profile-logo">' + esc(L(f.name).charAt(0)) + '</div>') +
        '<div class="profile-main">' +
          '<h1>' + esc(L(f.name)) + ' <span style="vertical-align:middle">' + verifyBadge(f) + '</span></h1>' +
          '<div class="meta" style="color:var(--ink-soft);font-size:13.5px">' + i.icon + ' ' + esc(L({en:i.en,ar:i.ar})) + (GOVS[fac.gov] ? ' · ' + ICONS.pin + ' ' + esc(L(GOVS[fac.gov])) : '') + '</div>' +
          '<div style="margin-top:12px"><a class="btn btn-primary btn-sm" href="factory-detail.html?id=' + encodeURIComponent(f.id) + '">' + t('mf_view_public') + ' ' + (LANG === 'ar' ? '←' : '→') + '</a></div>' +
        '</div>' +
      '</div></div>' +
      '<div class="profile-layout"><div>' +
        '<div class="panel"><h2>' + t('about') + '</h2><p>' + (L(f.desc) ? esc(L(f.desc)) : '<span class="muted">—</span>') + '</p></div>' +
        '<div class="panel"><h2>' + t('services_title') + '</h2>' +
          (svcNames.length ? '<div class="services-grid">' + svcNames.map(function (n) { return '<div class="service-card"><span class="svc-icon">' + ICONS.wrench + '</span><span>' + esc(n) + '</span></div>'; }).join('') + '</div>' : '<p>' + t('no_services') + '</p>') +
        '</div>' +
        '<div class="panel"><h2>' + t('products') + '</h2><div class="chip-row">' + L(prodList).map(function (p) { return '<span class="chip" style="font-size:13px;padding:7px 14px">' + esc(p) + '</span>'; }).join('') + '</div></div>' +
        '<div class="panel"><h2>' + t('capabilities') + '</h2><div class="chip-row">' + L(capList).map(function (p) { return '<span class="chip teal" style="font-size:13px;padding:7px 14px">' + esc(p) + '</span>'; }).join('') + '</div></div>' +
        '<div class="panel"><h2>' + t('gallery') + '</h2><div class="gallery">' +
          ((f.media && f.media.length)
            ? f.media.map(function (m) { return m.type === 'video' ? '<div class="ph"><video src="' + m.url + '" controls playsinline style="width:100%;height:100%;object-fit:cover"></video></div>' : '<a class="ph" href="' + m.url + '" target="_blank" style="background-image:url(\'' + m.url + '\');background-size:cover;background-position:center"></a>'; }).join('')
            : [0,1,2,3,4,5].map(function (n) { return '<div class="ph" style="background:' + grad(i.g) + ';opacity:' + (1 - n * 0.09) + '">' + (n < 3 ? ICONS.camera : i.icon) + '</div>'; }).join('')) +
        '</div></div>' +
        '<div class="panel"><h2>' + t('details') + '</h2><div class="spec-grid">' +
          '<div class="spec"><div class="k">' + t('established') + '</div><div class="v">' + (f.yr ? num(f.yr) : '—') + '</div></div>' +
          '<div class="spec"><div class="k">' + t('employees') + '</div><div class="v">' + (esc(f.emp) || '—') + '</div></div>' +
          '<div class="spec"><div class="k">' + t('location') + '</div><div class="v">' + ICONS.pin + ' ' + esc(L(f.gov)) + '</div></div>' +
          '<div class="spec"><div class="k">' + t('hours') + '</div><div class="v">' + esc(hoursTxt) + '</div></div>' +
          '<div class="spec"><div class="k">' + t('moq') + '</div><div class="v">' + num(f.moq) + ' ' + t('units') + '</div></div>' +
          '<div class="spec"><div class="k">' + t('certifications') + '</div><div class="v">' + (f.certs.length ? f.certs.join(' · ') : '—') + '</div></div>' +
        '</div></div>' +
      '</div><aside class="contact-panel">' + contact + '</aside></div>' +
    '</div>';
}

function renderMyFactory() {
  if (!window.Auth || !Auth.isLoggedIn()) { shell(Auth.gateHTML()); return; }
  shell('<div class="container" style="padding:60px 24px;text-align:center;color:var(--ink-soft)">…</div>');
  Auth.myFactory().then(function (fac) {
    MY_FAC = fac;
    if (!fac) {
      shell('<div class="container" style="padding:64px 24px;text-align:center;max-width:520px">' +
        '<p class="muted">' + t('mf_no_factory') + '</p>' +
        '<a class="btn btn-primary" style="margin-top:16px" href="account.html">' + t('fac_create') + '</a></div>');
      return;
    }
    if (fac.verified) { shell(verifiedFactoryHTML(fac)); return; }
    var i = ind(fac.sector);
    var gov = GOVS[fac.gov];
    shell(
      '<div class="container" style="margin-top:14px">' +
        '<div class="au-err" style="background:var(--amber-soft);color:#8A5A12;margin-bottom:14px">' + ICONS.clock + ' ' + t('mf_unverified_banner') + '</div>' +
        '<div class="profile-cover" style="background:' + grad(i.g) + ';border-radius:20px"><span class="cover-ic">' + i.icon + '</span></div>' +
        '<div class="profile-top"><div class="profile-card">' +
          '<div class="profile-logo">' + esc(String(fac.name).charAt(0)) + '</div>' +
          '<div class="profile-main">' +
            '<h1>' + esc(fac.name) + ' <span style="vertical-align:middle">' + verifyBadge({verified: fac.verified}) + '</span></h1>' +
            '<div class="meta" style="color:var(--ink-soft);font-size:13.5px">' + i.icon + ' ' + esc(L({en:i.en,ar:i.ar})) + (gov ? ' · ' + ICONS.pin + ' ' + esc(L(gov)) : '') + '</div>' +
          '</div>' +
        '</div></div>' +
        '<div class="profile-layout"><div>' +
          verifyBox(fac) +
          lockedPanel(t('about')) + lockedPanel(t('products')) + lockedPanel(t('capabilities')) + lockedPanel(t('services_title')) + lockedPanel(t('gallery')) +
        '</div><aside class="contact-panel">' + lockedPanel(t('contact_title')) + '</aside></div>' +
      '</div>'
    );
  }).catch(function (e) {
    shell('<div class="container" style="padding:64px 24px;text-align:center"><p class="muted">' + (e.message || e) + '</p></div>');
  });
}

function openVerifyForm() {
  if (!MY_FAC) return;
  var p = Auth.profile() || {};
  var bd = document.createElement('div');
  bd.className = 'modal-backdrop';
  bd.addEventListener('click', function (e) { if (e.target === bd) bd.remove(); });
  bd.innerHTML =
    '<div class="modal">' +
      '<h2>' + t('vf_form_title') + '</h2>' +
      '<p class="sub">' + t('vf_form_sub') + '</p>' +
      '<div class="au-err" id="vfErr" style="display:none"></div>' +
      '<div class="form-grid">' +
        '<div class="form-field full"><label>' + t('vf_name') + '</label><input id="vf_name" type="text" value="' + esc(p.full_name || '') + '"></div>' +
        '<div class="form-field full"><label>' + t('vf_number') + '</label><input id="vf_number" type="text" value="' + esc(p.phone || '') + '"></div>' +
        '<div class="form-field full"><label>' + t('vf_location') + '</label><input id="vf_location" type="text"></div>' +
      '</div>' +
      '<div class="modal-actions">' +
        '<button class="btn btn-ghost" onclick="this.closest(\'.modal-backdrop\').remove()">' + t('cancel') + '</button>' +
        '<button class="btn btn-primary" id="vf_submit">' + t('vf_submit') + '</button>' +
      '</div>' +
    '</div>';
  document.body.appendChild(bd);
  bd.querySelector('#vf_submit').onclick = function () { submitVerify(bd); };
}

function submitVerify(bd) {
  var v = function (id) { var e = bd.querySelector('#' + id); return e ? e.value.trim() : ''; };
  var info = { name: v('vf_name'), number: v('vf_number'), location: v('vf_location'), submitted_at: new Date().toISOString() };
  if (!info.name || !info.number) { var er = bd.querySelector('#vfErr'); er.textContent = t('fill_required'); er.style.display = 'block'; return; }
  var btn = bd.querySelector('#vf_submit'); btn.disabled = true; btn.textContent = '…';
  Auth.updateMyFactory(MY_FAC.id, { verification_requested: true, verification_info: info }).then(function () {
    bd.remove(); renderMyFactory();
  }).catch(function (e) { btn.disabled = false; btn.textContent = t('vf_submit'); alert('Could not send request: ' + (e.message || e)); });
}

document.addEventListener('DOMContentLoaded', function () {
  var savedLang = localStorage.getItem('sonnaLang');
  if (savedLang === 'en' || savedLang === 'ar') LANG = savedLang;
  document.documentElement.lang = LANG;
  document.documentElement.dir = LANG === 'ar' ? 'rtl' : 'ltr';
  renderMyFactory();
});
</script>
</body>
</html>
