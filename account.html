<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script>(function(){try{var l=localStorage.getItem('sonnaLang');if(l==='en'){document.documentElement.lang='en';document.documentElement.dir='ltr';}else if(l==='ar'){document.documentElement.lang='ar';document.documentElement.dir='rtl';}}catch(e){}})();</script>
<title>حسابي | صُنّاع</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Alexandria:wght@400;500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=Cairo:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

<div id="app"></div>

<script src="assets/js/icons.js"></script>
<script src="assets/js/lang.js"></script>
<script src="assets/js/data.js"></script>
<script src="assets/js/supabase-config.js"></script>
<script src="assets/js/store.js"></script>
<script src="assets/js/utils.js"></script>
<script src="assets/js/auth.js"></script>
<script src="assets/js/components.js"></script>
<script>
function accField(label, inputHTML) { return '<div class="form-field full"><label>' + label + '</label>' + inputHTML + '</div>'; }

function accountHtml(p, isFactory) {
  var statusBadge = isFactory
    ? (p.verified
        ? '<span class="chip teal">' + ICONS.check + ' ' + t('acc_verified') + '</span>'
        : '<span class="chip" style="background:var(--amber-soft);color:#8A5A12">' + ICONS.clock + ' ' + t('acc_unverified') + '</span>')
    : '';
  return '<div class="container" style="max-width:760px;padding:28px 24px 64px">' +
    '<div style="display:flex;align-items:center;gap:14px;margin-bottom:18px">' +
      '<span class="ci" style="width:52px;height:52px;background:var(--teal-tint);color:var(--teal);border-radius:14px;display:grid;place-items:center">' + ICONS.user + '</span>' +
      '<div><h1 style="font-size:24px;font-weight:800">' + t('acc_title') + '</h1>' +
        '<div class="muted">' + esc(p.email || '') + '</div></div>' +
    '</div>' +
    '<div class="panel" style="margin-bottom:16px">' +
      '<div class="spec-grid">' +
        '<div class="spec"><div class="k">' + t('acc_type') + '</div><div class="v">' + (isFactory ? t('acc_type_factory') : t('acc_type_user')) + '</div></div>' +
        (isFactory ? '<div class="spec"><div class="k">' + t('acc_status') + '</div><div class="v">' + statusBadge + '</div></div>' : '') +
      '</div>' +
      (isFactory && !p.verified ? '<p class="muted" style="margin-top:12px">' + t('acc_unverified_note') + '</p>' : '') +
    '</div>' +
    '<div class="panel">' +
      '<h2 style="margin-bottom:14px">' + t('acc_title') + '</h2>' +
      '<div class="form-grid">' +
        accField(t('au_name'), '<input id="ac_name" type="text" value="' + esc(p.full_name || '') + '">') +
        accField(t('au_phone'), '<input id="ac_phone" type="text" value="' + esc(p.phone || '') + '">') +
        (isFactory ? accField(t('au_company'), '<input id="ac_company" type="text" value="' + esc(p.company || '') + '">') : '') +
        (isFactory ? accField(t('au_city'), '<input id="ac_city" type="text" value="' + esc(p.city || '') + '">') : '') +
        (isFactory ? accField(t('au_website'), '<input id="ac_website" type="text" value="' + esc(p.website || '') + '">') : '') +
        (isFactory ? accField(t('au_bio'), '<textarea id="ac_bio">' + esc(p.bio || '') + '</textarea>') : '') +
      '</div>' +
      '<div class="modal-actions" style="margin-top:16px">' +
        '<button class="btn btn-ghost" onclick="Auth.logout()">' + t('logout') + '</button>' +
        '<button class="btn btn-primary" id="ac_save" onclick="saveAccount(' + (isFactory ? 'true' : 'false') + ')">' + t('acc_save') + '</button>' +
      '</div>' +
    '</div>' +
  '</div>';
}

function renderAccount() {
  var app = document.getElementById('app');
  var body;
  if (!window.Auth || !Auth.isLoggedIn()) {
    body = '<div class="container" style="padding:64px 24px;text-align:center;max-width:520px">' +
      '<span class="ci" style="width:56px;height:56px;background:var(--teal-tint);color:var(--teal);border-radius:16px;display:inline-grid;place-items:center;margin-bottom:14px">' + ICONS.user + '</span>' +
      '<h1 style="margin-bottom:10px">' + t('acc_title') + '</h1>' +
      '<p class="muted">' + t('acc_login_needed') + '</p>' +
      '<div style="margin-top:18px;display:flex;gap:10px;justify-content:center">' +
        '<button class="btn btn-primary" onclick="openAuthModal(\'login\')">' + t('login') + '</button>' +
        '<button class="btn btn-ghost" onclick="openAuthModal(\'signup\')">' + t('signup') + '</button>' +
      '</div>' +
    '</div>';
  } else {
    var p = Auth.profile() || {};
    body = accountHtml(p, p.account_type === 'factory');
  }
  app.innerHTML = headerHTML() + mobileMenuHTML() + '<main>' + body + '</main>' + footerHTML();
}

function saveAccount(isFactory) {
  var v = function(id){ var e = document.getElementById(id); return e ? e.value.trim() : undefined; };
  var fields = { full_name: v('ac_name'), phone: v('ac_phone') };
  if (isFactory) { fields.company = v('ac_company'); fields.city = v('ac_city'); fields.website = v('ac_website'); fields.bio = v('ac_bio'); }
  var btn = document.getElementById('ac_save'); btn.disabled = true; btn.textContent = '…';
  Auth.updateProfile(fields).then(function(){ btn.disabled = false; btn.textContent = t('acc_saved') + ' ✓'; setTimeout(function(){ btn.textContent = t('acc_save'); }, 2000); })
    .catch(function(e){ btn.disabled = false; btn.textContent = t('acc_save'); alert('Could not save changes: ' + (e.message || e)); });
}

document.addEventListener('DOMContentLoaded', function() {
  var savedLang = localStorage.getItem('sonnaLang');
  if (savedLang === 'en' || savedLang === 'ar') LANG = savedLang;
  document.documentElement.lang = LANG;
  document.documentElement.dir = LANG === 'ar' ? 'rtl' : 'ltr';
  renderAccount();
  // Refresh profile from the server, then re-render (verification status may have changed)
  if (window.Auth && Auth.isLoggedIn()) { Auth.refreshProfile().then(renderAccount).catch(function(){}); }
});
</script>
</body>
</html>
