<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script>(function(){try{var l=localStorage.getItem('sonnaLang');if(l==='en'){document.documentElement.lang='en';document.documentElement.dir='ltr';}else if(l==='ar'){document.documentElement.lang='ar';document.documentElement.dir='rtl';}var th=localStorage.getItem('sonnaTheme');if(!th){th=(window.matchMedia&&matchMedia('(prefers-color-scheme: dark)').matches)?'dark':'light';}document.documentElement.setAttribute('data-theme',th);}catch(e){}})();</script>
<title>حسابي | صُنّاع</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Alexandria:wght@400;500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=Cairo:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="icon" type="image/png" href="assets/favicon.png">
<link rel="apple-touch-icon" href="assets/favicon.png">
<link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

<div id="app"></div>

<script src="assets/js/icons.js"></script>
<script src="assets/js/lang.js"></script>
<script src="assets/js/data.js"></script>
<script src="assets/js/supabase-config.js"></script>
<script src="assets/js/store.js"></script>
<script src="assets/js/utils.js"></script>
<script src="assets/js/auth.js"></script>
<script src="assets/js/components.js"></script>
<script src="assets/js/chat.js"></script>
<script>
function accField(label, inputHTML) { return '<div class="form-field full"><label>' + label + '</label>' + inputHTML + '</div>'; }

function factoryStatusChip(fac) {
  if (fac.verified) return '<span class="chip teal">' + ICONS.check + ' ' + t('acc_verified') + '</span>';
  if (fac.verification_requested) return '<span class="chip" style="background:var(--amber-soft);color:#8A5A12">' + ICONS.clock + ' ' + t('mf_req_done') + '</span>';
  return '<span class="chip" style="background:var(--amber-soft);color:#8A5A12">' + ICONS.clock + ' ' + t('acc_unverified') + '</span>';
}

function factorySection(fac) {
  if (fac) {
    var i = ind(fac.sector);
    var gov = GOVS[fac.gov];
    return '<div class="panel" style="margin-bottom:16px">' +
      '<div style="display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:10px">' +
        '<h2>' + t('fac_section') + '</h2>' + factoryStatusChip(fac) +
      '</div>' +
      '<div class="spec-grid">' +
        '<div class="spec"><div class="k">' + t('fac_name') + '</div><div class="v">' + esc(fac.name) + '</div></div>' +
        '<div class="spec"><div class="k">' + t('fac_sector') + '</div><div class="v">' + esc(L({en:i.en,ar:i.ar})) + '</div></div>' +
        '<div class="spec"><div class="k">' + t('fac_location') + '</div><div class="v">' + (gov ? esc(L(gov)) : '—') + '</div></div>' +
      '</div>' +
      (fac.deletion_requested
        ? '<div class="lock-note" style="margin-top:14px;color:#B4322A">' + ICONS.clock + ' ' + t('fac_del_pending') + '</div>'
        : '') +
      '<div style="margin-top:14px;display:flex;gap:10px;flex-wrap:wrap">' +
        '<a class="btn btn-primary btn-sm" href="dashboard.html">' + ICONS.chartBar + ' ' + t('dash_link') + '</a>' +
        '<a class="btn btn-ghost btn-sm" href="my-factory.html">' + t('fac_view') + ' ' + (LANG==='ar'?'←':'→') + '</a>' +
        (fac.deletion_requested ? '' : '<button class="btn btn-ghost btn-sm" onclick="requestFactoryDeletion(\'' + esc(fac.id) + '\')">' + t('fac_del_request') + '</button>') +
      '</div>' +
    '</div>';
  }
  var sectorOpts = INDUSTRIES.map(function(s){ return '<option value="'+esc(s.id)+'">'+esc(L({en:s.en,ar:s.ar}))+'</option>'; }).join('');
  var govOpts = GOVS.map(function(g,ix){ return '<option value="'+ix+'">'+esc(L(g))+'</option>'; }).join('');
  return '<div class="panel" style="margin-bottom:16px">' +
    '<h2>' + t('fac_have_q') + '</h2>' +
    '<p class="muted" style="margin:6px 0 14px">' + t('fac_have_sub') + '</p>' +
    '<div class="form-grid">' +
      accField(t('fac_name'), '<input id="nf_name" type="text">') +
      accField(t('fac_sector'), '<select id="nf_sector">'+sectorOpts+'</select>') +
      accField(t('fac_location'), '<select id="nf_gov">'+govOpts+'</select>') +
    '</div>' +
    '<div style="margin-top:14px"><button class="btn btn-primary" id="nf_create" onclick="createFactory()">' + t('fac_create_btn') + '</button></div>' +
  '</div>';
}

function dashboardHtml(p, fac) {
  return '<div class="container" style="max-width:820px;padding:28px 24px 64px">' +
    '<div style="display:flex;align-items:center;gap:14px;margin-bottom:20px">' +
      '<span class="ci" style="width:52px;height:52px;background:var(--teal-tint);color:var(--teal);border-radius:14px;display:grid;place-items:center">' + ICONS.user + '</span>' +
      '<div><h1 style="font-size:24px;font-weight:800">' + t('acc_title') + '</h1><div class="muted">' + esc(p.full_name || p.email || '') + '</div></div>' +
    '</div>' +
    '<div class="dash-actions">' +
      '<a class="btn btn-ghost" href="factories.html">' + ICONS.factory + ' ' + t('dash_browse') + '</a>' +
      '<a class="btn btn-ghost" href="favorites.html">' + ICONS.heart + ' ' + t('fav_shortlist') + '</a>' +
      '<button class="btn btn-ghost" onclick="openRequestForm()">' + ICONS.megaphone + ' ' + t('dash_post') + '</button>' +
    '</div>' +
    factorySection(fac) +
    '<div class="panel" id="myRfqPanel" style="margin-bottom:16px"><h2>' + t('myrfq_title') + '</h2>' + loadingHTML() + '</div>' +
    '<div class="panel">' +
      '<h2 style="margin-bottom:14px">' + t('dash_profile') + '</h2>' +
      '<div class="form-grid">' +
        accField(t('au_name'), '<input id="ac_name" type="text" value="' + esc(p.full_name || '') + '">') +
        accField(t('au_phone'), '<input id="ac_phone" type="text" value="' + esc(p.phone || '') + '">') +
      '</div>' +
      '<div class="modal-actions" style="margin-top:16px">' +
        '<button class="btn btn-ghost" onclick="Auth.logout()">' + t('logout') + '</button>' +
        '<button class="btn btn-primary" id="ac_save" onclick="saveAccount()">' + t('acc_save') + '</button>' +
      '</div>' +
    '</div>' +
    verifyPanel(p) +
    '<div class="panel danger-zone" style="margin-top:16px">' +
      '<h2 style="margin-bottom:6px">' + t('acc_danger') + '</h2>' +
      '<p class="muted" style="margin-bottom:14px">' + t('acc_delete_note') + '</p>' +
      '<button class="btn btn-danger" id="acc_del" onclick="deleteMyAccount()">' + t('acc_delete_btn') + '</button>' +
    '</div>' +
  '</div>';
}

function prefRow(key, label) {
  var p = Auth.profile() || {};
  var on = p[key] !== false;   // default on
  return '<label class="pref-row">' +
    '<span>' + label + '</span>' +
    '<input type="checkbox" class="pref-toggle" data-pref="' + key + '"' + (on ? ' checked' : '') + '>' +
  '</label>';
}

function verifyPanel(p) {
  var emailOK = Auth.emailVerified && Auth.emailVerified();
  var okBadge = '<span class="vchip ok">' + (ICONS.check || '✓') + ' ' + t('ver_verified') + '</span>';
  var pendBadge = '<span class="vchip pend">' + t('ver_pending') + '</span>';
  return '<div class="panel" style="margin-top:16px">' +
    '<h2 style="margin-bottom:4px">' + t('acc_ver_title') + '</h2>' +
    '<p class="muted" style="margin-bottom:16px">' + t('ver_sub') + '</p>' +

    '<div class="ver-row">' +
      '<div><div class="ver-label">' + ICONS.mail + ' ' + t('ver_email') + '</div>' +
        '<div class="muted" style="font-size:13px">' + esc(p.email || (Auth.user() && Auth.user().email) || '') + '</div></div>' +
      (emailOK ? okBadge : pendBadge) +
    '</div>' +

    '<div class="ver-row" id="phoneRow">' +
      '<div><div class="ver-label">' + ICONS.phone + ' ' + t('ver_phone') + ' <span class="opt">(' + t('optional') + ')</span></div>' +
        '<div class="muted" style="font-size:13px" id="phoneState">' + t('ver_checking') + '</div></div>' +
      '<div id="phoneAction"></div>' +
    '</div>' +
    '<div id="phoneForm"></div>' +

    '<h3 style="margin:20px 0 4px;font-size:15px">' + t('ver_prefs_title') + '</h3>' +
    '<p class="muted" style="margin-bottom:12px;font-size:13px">' + t('ver_prefs_sub') + '</p>' +
    '<div class="pref-list">' +
      prefRow('notify_messages', t('pref_messages')) +
      prefRow('notify_matches',  t('pref_matches')) +
      prefRow('notify_requests', t('pref_requests')) +
      prefRow('notify_factory',  t('pref_factory')) +
    '</div>' +
    '<div class="modal-actions" style="margin-top:14px">' +
      '<button class="btn btn-primary" id="pref_save" onclick="savePrefs()">' + t('acc_save') + '</button>' +
    '</div>' +
  '</div>';
}

function shell(body) { document.getElementById('app').innerHTML = headerHTML() + mobileMenuHTML() + '<main>' + body + '</main>' + footerHTML(); }

function renderAccount() {
  if (!window.Auth || !Auth.isLoggedIn()) {
    shell('<div class="container" style="padding:64px 24px;text-align:center;max-width:520px">' +
      '<h1 style="margin-bottom:10px">' + t('acc_title') + '</h1>' +
      '<p class="muted">' + t('acc_login_needed') + '</p>' +
      '<div style="margin-top:18px;display:flex;gap:10px;justify-content:center">' +
        '<button class="btn btn-primary" onclick="openAuthModal(\'login\')">' + t('login') + '</button>' +
        '<button class="btn btn-ghost" onclick="openAuthModal(\'signup\')">' + t('signup') + '</button>' +
      '</div></div>');
    return;
  }
  var p = Auth.profile() || {};
  shell(dashboardHtml(p, null));   // render immediately, then fill in the factory
  loadPhoneState();
  Auth.myFactory().then(function(fac){ shell(dashboardHtml(p, fac)); loadMyRFQs(); loadPhoneState(); }).catch(function(){ loadMyRFQs(); });
}

// ---- Optional phone verification ----
function loadPhoneState() {
  var state = document.getElementById('phoneState');
  var action = document.getElementById('phoneAction');
  if (!state || !Auth.verifiedPhone) return;
  Auth.verifiedPhone().then(function (vp) {
    if (vp && vp.phone) {
      state.textContent = vp.phone;
      action.innerHTML = '<span class="vchip ok">' + (ICONS.check || '✓') + ' ' + t('ver_verified') + '</span>';
      document.getElementById('phoneForm').innerHTML = '';
    } else {
      state.textContent = t('ver_phone_none');
      action.innerHTML = '<button class="btn btn-ghost btn-sm" onclick="showPhoneForm()">' + t('ver_add_phone') + '</button>';
    }
  }).catch(function () {
    state.textContent = t('ver_phone_none');
    action.innerHTML = '<button class="btn btn-ghost btn-sm" onclick="showPhoneForm()">' + t('ver_add_phone') + '</button>';
  });
}

function showPhoneForm() {
  var p = Auth.profile() || {};
  var el = document.getElementById('phoneForm');
  el.innerHTML =
    '<div class="phone-verify">' +
      '<div class="au-err" id="phErr" style="display:none"></div>' +
      '<div class="form-grid">' +
        accField(t('ver_phone_label'), '<input id="ph_num" type="tel" placeholder="+20 1XX XXX XXXX" value="' + esc(p.phone || '') + '">') +
      '</div>' +
      '<div class="modal-actions" style="margin-top:10px"><button class="btn btn-primary" id="ph_send" onclick="sendPhoneCode()">' + t('ver_send_code') + '</button></div>' +
    '</div>';
}

function sendPhoneCode() {
  var num = (document.getElementById('ph_num').value || '').trim();
  var err = document.getElementById('phErr');
  err.style.display = 'none';
  if (!num) { err.textContent = t('ver_enter_phone'); err.style.display = 'block'; return; }
  var btn = document.getElementById('ph_send'); btn.disabled = true; btn.textContent = '…';
  Auth.startPhoneVerify(num).then(function () {
    document.getElementById('phoneForm').innerHTML =
      '<div class="phone-verify">' +
        '<p class="muted" style="font-size:13px;margin-bottom:8px">' + t('ver_code_sent') + ' <strong>' + esc(num) + '</strong>.</p>' +
        '<div class="au-err" id="phErr2" style="display:none"></div>' +
        '<div class="form-grid">' +
          accField(t('ver_code'), '<input id="ph_code" type="text" inputmode="numeric" autocomplete="one-time-code" placeholder="000000">') +
        '</div>' +
        '<div class="modal-actions" style="margin-top:10px">' +
          '<button class="btn btn-ghost" onclick="showPhoneForm()">' + t('ver_change_num') + '</button>' +
          '<button class="btn btn-primary" id="ph_check" onclick="checkPhoneCode(\'' + esc(num).replace(/'/g, "\\'") + '\')">' + t('ver_verify') + '</button>' +
        '</div>' +
      '</div>';
  }).catch(function (e) {
    btn.disabled = false; btn.textContent = t('ver_send_code');
    err.textContent = e.message || String(e); err.style.display = 'block';
  });
}

function checkPhoneCode(num) {
  var code = (document.getElementById('ph_code').value || '').trim();
  var err = document.getElementById('phErr2');
  err.style.display = 'none';
  if (!code) { err.textContent = t('ver_enter_code'); err.style.display = 'block'; return; }
  var btn = document.getElementById('ph_check'); btn.disabled = true; btn.textContent = '…';
  Auth.checkPhoneVerify(num, code).then(function () {
    // Keep the profile phone field in sync with the verified number.
    Auth.updateProfile({ phone: num }).catch(function () {});
    loadPhoneState();
  }).catch(function (e) {
    btn.disabled = false; btn.textContent = t('ver_verify');
    err.textContent = e.message || String(e); err.style.display = 'block';
  });
}

function savePrefs() {
  var patch = {};
  var toggles = document.querySelectorAll('.pref-toggle');
  for (var i = 0; i < toggles.length; i++) { patch[toggles[i].getAttribute('data-pref')] = toggles[i].checked; }
  var btn = document.getElementById('pref_save'); btn.disabled = true; btn.textContent = '…';
  Auth.updateProfile(patch)
    .then(function () { btn.disabled = false; btn.textContent = t('acc_saved') + ' ✓'; setTimeout(function () { btn.textContent = t('acc_save'); }, 2000); })
    .catch(function (e) { btn.disabled = false; btn.textContent = t('acc_save'); alert('Could not save: ' + (e.message || e)); });
}

function loadMyRFQs() {
  var panel = document.getElementById('myRfqPanel');
  if (!panel || !Auth.myRFQs) return;
  Auth.myRFQs().then(function (rfqs) {
    if (!rfqs.length) { panel.innerHTML = '<h2>' + t('myrfq_title') + '</h2><p class="muted">' + t('myrfq_none') + '</p>'; return; }
    Promise.all(rfqs.map(function (r) { return Auth.rfqQuotes(r.id).then(function (q) { r._quotes = q || []; return r; }); }))
      .then(function (list) {
        panel.innerHTML = '<h2>' + t('myrfq_title') + '</h2>' + list.map(buyerRfqCard).join('');
      });
  });
}
function buyerRfqCard(rfq) {
  var quotes = rfq._quotes || [];
  return '<div class="rfq-item">' +
    '<div class="rfq-top"><b>' + esc(rfq.title || '') + '</b>' +
      '<span class="rfq-status s-' + esc(rfq.status) + '">' + t('rfq_status_' + rfq.status) + '</span></div>' +
    '<div class="muted" style="font-size:12.5px">' + esc(rfq.factory_name || '') + ' · ' + t('qty') + ': ' + esc(rfq.qty || '—') + '</div>' +
    (quotes.length
      ? '<div class="quote-list">' + quotes.map(function (q) {
          return '<div class="quote-item">' +
            '<b>' + t('quote_price') + ': ' + esc(q.price || '—') + '</b>' +
            (q.lead_time ? ' · ' + t('quote_lead') + ': ' + esc(q.lead_time) : '') +
            (q.notes ? '<p style="font-size:13px;margin:4px 0 0">' + esc(q.notes) + '</p>' : '') +
            (q.file_url ? '<a href="' + encodeURI(q.file_url) + '" target="_blank" class="chip" style="margin-top:6px;display:inline-flex">' + ICONS.clipboard + ' ' + esc(q.file_name || t('quote_file')) + '</a>' : '') +
          '</div>';
        }).join('') + '</div>'
      : '<p class="muted" style="font-size:12.5px;margin-top:6px">' + t('myrfq_waiting') + '</p>') +
  '</div>';
}

function createFactory() {
  var name = (document.getElementById('nf_name').value || '').trim();
  if (!name) { alert(t('fac_name')); return; }
  var sector = document.getElementById('nf_sector').value;
  var gov = Number(document.getElementById('nf_gov').value);
  var btn = document.getElementById('nf_create'); btn.disabled = true; btn.textContent = '…';
  Auth.createFactory(name, sector, gov).then(function(){ window.location.href = 'my-factory.html'; })
    .catch(function(e){ btn.disabled = false; btn.textContent = t('fac_create_btn'); alert('Could not create: ' + (e.message || e)); });
}

function saveAccount() {
  var v = function(id){ var e = document.getElementById(id); return e ? e.value.trim() : undefined; };
  var btn = document.getElementById('ac_save'); btn.disabled = true; btn.textContent = '…';
  Auth.updateProfile({ full_name: v('ac_name'), phone: v('ac_phone') })
    .then(function(){ btn.disabled = false; btn.textContent = t('acc_saved') + ' ✓'; setTimeout(function(){ btn.textContent = t('acc_save'); }, 2000); })
    .catch(function(e){ btn.disabled = false; btn.textContent = t('acc_save'); alert('Could not save changes: ' + (e.message || e)); });
}

function requestFactoryDeletion(id) {
  if (!confirm(t('fac_del_confirm'))) return;
  Auth.requestFactoryDeletion(id)
    .then(function(){ toast(t('fac_del_done')); renderAccount(); })
    .catch(function(e){ alert('Could not send request: ' + (e.message || e)); });
}

function deleteMyAccount() {
  if (!confirm(t('acc_delete_confirm'))) return;
  if (!confirm(t('acc_delete_confirm2'))) return;
  var btn = document.getElementById('acc_del'); btn.disabled = true; btn.textContent = '…';
  Auth.deleteAccount()
    .then(function(){ alert(t('acc_delete_ok')); window.location.href = 'index.html'; })
    .catch(function(e){ btn.disabled = false; btn.textContent = t('acc_delete_btn'); alert('Could not delete account: ' + (e.message || e)); });
}

document.addEventListener('DOMContentLoaded', function() {
  var savedLang = localStorage.getItem('sonnaLang');
  if (savedLang === 'en' || savedLang === 'ar') LANG = savedLang;
  document.documentElement.lang = LANG;
  document.documentElement.dir = LANG === 'ar' ? 'rtl' : 'ltr';
  renderAccount();
  if (window.Auth && Auth.isLoggedIn()) { Auth.refreshProfile().then(renderAccount).catch(function(){}); }
});
</script>
</body>
</html>
