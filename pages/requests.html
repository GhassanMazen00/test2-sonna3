<div class="page-head">
  <div class="container" style="display:flex;justify-content:space-between;align-items:center;gap:16px;flex-wrap:wrap">
    <div>
      <h1 id="reqPageTitle"></h1>
      <p id="reqPageSub"></p>
    </div>
    <button class="btn btn-primary" onclick="openRequestForm()" id="postReqBtn"></button>
  </div>
</div>

<div class="container req-layout">
  <div class="card-grid" id="requestsGrid"></div>
</div>

<script>
(function() {
  document.getElementById('reqPageTitle').textContent = t('req_title');
  document.getElementById('reqPageSub').textContent = t('req_sub');
  document.getElementById('postReqBtn').textContent = '📣 ' + t('post_request');
  
  if (REQUESTS.length === 0) {
    document.getElementById('requestsGrid').innerHTML = 
      '<div class="empty"><div class="big">📋</div><b>' + t('no_results') + '</b><p>' + t('no_results_sub') + '</p></div>';
  } else {
    document.getElementById('requestsGrid').innerHTML = REQUESTS.map(function(r) {
      var daysAgo = STR[LANG].days_ago(r.days);
      return '<button class="request-card" onclick="viewRequestDetail(\'' + r.id + '\')">' +
        '<div class="thumb">' + r.icon + '</div>' +
        '<h3>' + esc(L(r.title)) + '</h3>' +
        '<div class="desc">' + esc(L(r.desc)) + '</div>' +
        '<div class="foot">' +
          '<span>📦 ' + t('qty') + ': <b>' + num(r.qty) + '</b></span>' +
          '<span>📍 ' + L(GOVS[r.gov]) + '</span>' +
          '<span>🕒 ' + daysAgo + '</span>' +
        '</div>' +
      '</button>';
    }).join('');
  }
})();

function viewRequestDetail(id) {
  window.location.href = 'request-detail.html?id=' + id;
}
</script>
