<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Alexandria:wght@400;500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=Cairo:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

<div id="app"></div>

<script src="assets/js/icons.js"></script>
<script src="assets/js/lang.js"></script>
<script src="assets/js/data.js"></script>
<script src="assets/js/supabase-config.js"></script>
<script src="assets/js/store.js"></script>
<script src="assets/js/utils.js"></script>
<script src="assets/js/auth.js"></script>
<script src="assets/js/components.js"></script>
<script src="assets/js/chat.js"></script>
<script>
function daysAgo(iso) {
  var ms = Date.now() - new Date(iso).getTime();
  return Math.max(0, Math.floor(ms / 86400000));
}
// A live request row (from Supabase) rendered as a card. The "Message poster"
// button opens a chat tagged with this request; it is hidden on your own posts.
function liveRequestCard(r) {
  var me = window.Chat && Chat.myId ? Chat.myId() : null;
  var mine = me && String(r.owner) === String(me);
  var gov = (r.gov != null && GOVS[r.gov]) ? L(GOVS[r.gov]) : 'â€”';
  var hasMedia = r.media && r.media.length;
  var thumb = hasMedia && r.media[0].type !== 'video'
    ? '<div class="thumb" style="background-image:url(\'' + r.media[0].url + '\');background-size:cover;background-position:center"></div>'
    : '<div class="thumb">' + ICONS.clipboard + '</div>';
  var titleAttr = esc(String(r.title || '')).replace(/'/g, '&#39;');
  return '<div class="request-card" onclick="location.href=\'request-detail.html?id=' + encodeURIComponent(r.id) + '\'" style="cursor:pointer">' +
    thumb +
    '<h3>' + esc(r.title || '') + '</h3>' +
    '<div class="desc">' + esc(r.description || '') + '</div>' +
    '<div class="foot">' +
      '<span>' + ICONS.box + ' ' + t('qty') + ': <b>' + esc(r.qty || 'â€”') + '</b></span>' +
      '<span>' + ICONS.pin + ' ' + gov + '</span>' +
      '<span>' + ICONS.clock + ' ' + STR[LANG].days_ago(daysAgo(r.created_at)) + '</span>' +
    '</div>' +
    (mine
      ? '<div class="req-owner-tag">' + ICONS.user + ' ' + t('req_yours') + '</div>'
      : '<button class="btn btn-primary btn-sm req-msg-btn" onclick="event.stopPropagation();Chat.openWith(\'' + esc(r.owner) + '\',\'' + esc(r.owner_name || 'User').replace(/'/g, '&#39;') + '\',{requestId:\'' + esc(r.id) + '\',requestTitle:\'' + titleAttr + '\'})">' + ICONS.chat + ' ' + t('req_message') + '</button>') +
  '</div>';
}

document.addEventListener('DOMContentLoaded', function() {
  AdminStore.bootstrap().then(function() {
  var savedLang = localStorage.getItem('sonnaLang');
  if (savedLang === 'en' || savedLang === 'ar') {
    LANG = savedLang;
  }
  document.documentElement.lang = LANG;
  document.documentElement.dir = LANG === 'ar' ? 'rtl' : 'ltr';

  var app = document.getElementById('app');

  // Members-only: require login to view requests
  if (!window.Auth || !Auth.isLoggedIn()) {
    app.innerHTML = headerHTML() + mobileMenuHTML() + '<main>' + Auth.gateHTML() + '</main>' + footerHTML();
    return;
  }
  app.innerHTML = headerHTML() + mobileMenuHTML() + '<main>' +
    '<div class="page-head">' +
      '<div class="container" style="display:flex;justify-content:space-between;align-items:center;gap:16px;flex-wrap:wrap">' +
        '<div>' +
          '<h1>' + t('req_title') + '</h1>' +
          '<p>' + t('req_sub') + '</p>' +
        '</div>' +
        '<button class="btn btn-primary" onclick="openRequestForm()">' + ICONS.megaphone + ' ' + t('post_request') + '</button>' +
      '</div>' +
    '</div>' +
    '<div class="container req-layout">' +
      '<div class="card-grid" id="reqGrid">' +
        '<div class="empty"><div class="big">' + ICONS.clipboard + '</div><p>â€¦</p></div>' +
      '</div>' +
    '</div>' +
  '</main>' +
  footerHTML();

  AdminStore.fetchRequests().then(function (rows) {
    var grid = document.getElementById('reqGrid');
    if (!grid) return;
    if (rows && rows.length) {
      grid.innerHTML = rows.map(liveRequestCard).join('');
    } else {
      grid.innerHTML = '<div class="empty"><div class="big">' + ICONS.clipboard + '</div><b>' + t('req_none') + '</b><p>' + t('req_none_sub') + '</p></div>';
    }
    if (window.updateChatBadge) updateChatBadge();
  });
  });
});
</script>
</body>
</html>
