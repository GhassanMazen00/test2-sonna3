<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script>(function(){try{var l=localStorage.getItem('sonnaLang');if(l==='en'){document.documentElement.lang='en';document.documentElement.dir='ltr';}else if(l==='ar'){document.documentElement.lang='ar';document.documentElement.dir='rtl';}}catch(e){}})();</script>
<title>طلبات التصنيع | صُنّاع</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Alexandria:wght@400;500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=Cairo:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

<div id="app"></div>

<script src="assets/js/icons.js"></script>
<script src="assets/js/lang.js"></script>
<script src="assets/js/data.js"></script>
<script src="assets/js/supabase-config.js"></script>
<script src="assets/js/store.js"></script>
<script src="assets/js/utils.js"></script>
<script src="assets/js/auth.js"></script>
<script src="assets/js/components.js"></script>
<script src="assets/js/chat.js"></script>
<script>
function daysAgo(iso) {
  var ms = Date.now() - new Date(iso).getTime();
  return Math.max(0, Math.floor(ms / 86400000));
}
// A live request row (from Supabase) rendered as a card. The "Message poster"
// button opens a chat tagged with this request; it is hidden on your own posts.
function liveRequestCard(r) {
  var me = window.Chat && Chat.myId ? Chat.myId() : null;
  var mine = me && String(r.owner) === String(me);
  var gov = (r.gov != null && GOVS[r.gov]) ? L(GOVS[r.gov]) : '—';
  var hasMedia = r.media && r.media.length;
  var thumb = hasMedia && r.media[0].type !== 'video'
    ? '<div class="thumb" style="background-image:url(\'' + r.media[0].url + '\');background-size:cover;background-position:center"></div>'
    : '<div class="thumb">' + ICONS.clipboard + '</div>';
  var titleAttr = esc(String(r.title || '')).replace(/'/g, '&#39;');
  return '<div class="request-card" onclick="location.href=\'request-detail.html?id=' + encodeURIComponent(r.id) + '\'" style="cursor:pointer">' +
    thumb +
    '<h3>' + esc(r.title || '') + '</h3>' +
    '<div class="desc">' + esc(r.description || '') + '</div>' +
    '<div class="foot">' +
      '<span>' + ICONS.box + ' ' + t('qty') + ': <b>' + esc(r.qty || '—') + '</b></span>' +
      '<span>' + ICONS.pin + ' ' + gov + '</span>' +
      '<span>' + ICONS.clock + ' ' + STR[LANG].days_ago(daysAgo(r.created_at)) + '</span>' +
    '</div>' +
    (mine
      ? '<div class="req-owner-tag">' + ICONS.user + ' ' + t('req_yours') + '</div>'
      : '<button class="btn btn-primary btn-sm req-msg-btn" onclick="event.stopPropagation();Chat.openWith(\'' + esc(r.owner) + '\',\'' + esc(r.owner_name || 'User').replace(/'/g, '&#39;') + '\',{requestId:\'' + esc(r.id) + '\',requestTitle:\'' + titleAttr + '\'})">' + ICONS.chat + ' ' + t('req_message') + '</button>') +
  '</div>';
}

document.addEventListener('DOMContentLoaded', function() {
  AdminStore.bootstrap().then(function() {
  var savedLang = localStorage.getItem('sonnaLang');
  if (savedLang === 'en' || savedLang === 'ar') {
    LANG = savedLang;
  }
  document.documentElement.lang = LANG;
  document.documentElement.dir = LANG === 'ar' ? 'rtl' : 'ltr';

  var app = document.getElementById('app');

  // Members-only: require login to view requests
  if (!window.Auth || !Auth.isLoggedIn()) {
    app.innerHTML = headerHTML() + mobileMenuHTML() + '<main>' + Auth.gateHTML() + '</main>' + footerHTML();
    return;
  }
  var govOptions = '<option value="">' + t('all') + '</option>' +
    GOVS.map(function (g, ix) { return '<option value="' + ix + '">' + L(g) + '</option>'; }).join('');
  app.innerHTML = headerHTML() + mobileMenuHTML() + '<main>' +
    '<div class="page-head">' +
      '<div class="container" style="display:flex;justify-content:space-between;align-items:center;gap:16px;flex-wrap:wrap">' +
        '<div>' +
          '<h1>' + t('req_title') + '</h1>' +
          '<p>' + t('req_sub') + '</p>' +
        '</div>' +
        '<button class="btn btn-primary" onclick="openRequestForm()">' + ICONS.megaphone + ' ' + t('post_request') + '</button>' +
      '</div>' +
    '</div>' +
    '<div class="container">' +
      '<div class="req-toolbar">' +
        '<div class="req-search">' + ICONS.search +
          '<input type="text" id="reqSearch" placeholder="' + t('req_search_ph') + '" oninput="onReqFilter(\'q\', this.value)">' +
        '</div>' +
        '<select id="reqGovFilter" onchange="onReqFilter(\'gov\', this.value)">' + govOptions + '</select>' +
        '<select id="reqSort" onchange="onReqFilter(\'sort\', this.value)">' +
          '<option value="new">' + t('req_sort_new') + '</option>' +
          '<option value="old">' + t('req_sort_old') + '</option>' +
        '</select>' +
      '</div>' +
      '<div class="results-bar"><span class="count"><b id="reqCount">0</b> <span>' + t('results') + '</span></span></div>' +
      '<div class="card-grid" id="reqGrid">' +
        '<div class="empty"><div class="big">' + ICONS.clipboard + '</div><p>…</p></div>' +
      '</div>' +
    '</div>' +
  '</main>' +
  footerHTML();

  AdminStore.fetchRequests().then(function (rows) {
    REQ_ROWS = rows || [];
    renderReqList();
    if (window.updateChatBadge) updateChatBadge();
  });
  });
});

var REQ_ROWS = [];
var REQ_FILTERS = { q: '', gov: '', sort: 'new' };

function onReqFilter(key, value) { REQ_FILTERS[key] = value; renderReqList(); }

// Relevance for a request search — title matches beat description/material/name.
function reqScore(r, q) {
  q = String(q || '').toLowerCase().trim();
  if (!q) return 0;
  var title = String(r.title || '').toLowerCase();
  var best = 0;
  if (title === q) best = 100;
  else if (title.indexOf(q) === 0) best = 85;
  else if (new RegExp('\\b' + q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')).test(title)) best = 72;
  else if (title.indexOf(q) >= 0) best = 58;
  var rest = (String(r.description || '') + ' ' + String(r.material || '') + ' ' + String(r.owner_name || '')).toLowerCase();
  if (rest.indexOf(q) >= 0) best = Math.max(best, 24);
  return best;
}

function renderReqList() {
  var grid = document.getElementById('reqGrid');
  var countEl = document.getElementById('reqCount');
  if (!grid) return;
  var q = (REQ_FILTERS.q || '').toLowerCase().trim();
  var list = REQ_ROWS.filter(function (r) {
    if (REQ_FILTERS.gov !== '' && String(r.gov) !== String(REQ_FILTERS.gov)) return false;
    if (q) {
      var hay = (String(r.title || '') + ' ' + String(r.description || '') + ' ' + String(r.material || '') + ' ' + String(r.owner_name || '')).toLowerCase();
      if (hay.indexOf(q) === -1) return false;
    }
    return true;
  });
  if (q) {
    list.sort(function (a, b) {
      var d = reqScore(b, q) - reqScore(a, q);
      if (d) return d;
      return new Date(b.created_at) - new Date(a.created_at);
    });
  } else {
    list.sort(function (a, b) {
      return REQ_FILTERS.sort === 'old'
        ? new Date(a.created_at) - new Date(b.created_at)
        : new Date(b.created_at) - new Date(a.created_at);
    });
  }
  if (countEl) countEl.textContent = num(list.length);
  if (!REQ_ROWS.length) {
    grid.innerHTML = '<div class="empty"><div class="big">' + ICONS.clipboard + '</div><b>' + t('req_none') + '</b><p>' + t('req_none_sub') + '</p></div>';
  } else if (!list.length) {
    grid.innerHTML = '<div class="empty"><div class="big">' + ICONS.search + '</div><b>' + t('req_no_match') + '</b></div>';
  } else {
    grid.innerHTML = list.map(liveRequestCard).join('');
  }
}
</script>
</body>
</html>
