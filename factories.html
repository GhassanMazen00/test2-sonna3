<script>
// Override the router initialization for this page
document.addEventListener('DOMContentLoaded', function() {
  AdminStore.bootstrap().then(function() {
  var app = document.getElementById('app');

  // Detect language from saved preference or URL parameter
  var savedLang = localStorage.getItem('sonnaLang');
  if (savedLang === 'en' || savedLang === 'ar') {
    LANG = savedLang;
  }
  document.documentElement.lang = LANG;
  document.documentElement.dir = LANG === 'ar' ? 'rtl' : 'ltr';

  // Get FILTERS from localStorage if available
  var savedFilters = localStorage.getItem('sonnaFilters');
  if (savedFilters) {
    try { FILTERS = JSON.parse(savedFilters); } catch(e) {}
  }
  
  // Build the page
  var html = headerHTML() + mobileMenuHTML() + '<main>' +
    '<div class="page-head">' +
      '<div class="container" style="display:flex;justify-content:space-between;align-items:center;gap:16px;flex-wrap:wrap">' +
        '<div>' +
          '<h1>' + t('dir_title') + '</h1>' +
          '<p>' + t('dir_sub') + '</p>' +
        '</div>' +
        ((window.Auth && Auth.isLoggedIn()) ? '<a class="btn btn-ghost" href="favorites.html">' + ICONS.heart + ' ' + t('fav_shortlist') + '</a>' : '') +
      '</div>' +
    '</div>' +
    '<div class="container dir-layout">' +
      '<aside class="filters">' +
        '<h3><span>' + t('filters') + '</span> <button class="clear" onclick="clearAllFilters()">' + t('clear') + '</button></h3>' +
        
        '<div class="f-group">' +
          '<label>' + (LANG === 'ar' ? 'بحث' : 'Search') + '</label>' +
          '<input type="text" id="searchInput" placeholder="' + t('search_ph') + '" onchange="updateFilter(\'q\', this.value)">' +
        '</div>' +
        
        (FILTER_CONFIG.industry ?
        '<div class="f-group">' +
          '<label>' + t('f_industry') + '</label>' +
          '<select id="industryFilter" onchange="updateFilter(\'industry\', this.value)">' +
            '<option value="">' + t('all') + '</option>' +
            INDUSTRIES.map(function(i) { return '<option value="' + i.id + '">' + L({en: i.en, ar: i.ar}) + '</option>'; }).join('') +
          '</select>' +
        '</div>' : '') +

        (FILTER_CONFIG.gov && (window.Auth && Auth.isLoggedIn()) ?
        '<div class="f-group">' +
          '<label>' + t('f_gov') + '</label>' +
          '<select id="govFilter" onchange="updateFilter(\'gov\', this.value)">' +
            '<option value="">' + t('all') + '</option>' +
            GOVS.map(function(g, ix) { return '<option value="' + ix + '">' + L(g) + '</option>'; }).join('') +
          '</select>' +
        '</div>' : '') +

        (FILTER_CONFIG.moq ?
        '<div class="f-group">' +
          '<label>' + t('f_moq') + '</label>' +
          '<input type="number" id="moqFilter" min="0" placeholder="' + (LANG === 'ar' ? 'مثال: ٥٠٠' : 'e.g. 500') + '" onchange="updateFilter(\'moq\', this.value)">' +
        '</div>' : '') +

        (FILTER_CONFIG.cert ?
        '<div class="f-group">' +
          '<label>' + t('f_cert') + '</label>' +
          '<select id="certFilter" onchange="updateFilter(\'cert\', this.value)">' +
            '<option value="">' + t('all') + '</option>' +
            CERTS.map(function(c) { return '<option value="' + c + '">' + c + '</option>'; }).join('') +
          '</select>' +
        '</div>' : '') +

        (FILTER_CONFIG.capacity ?
        '<div class="f-group">' +
          '<label>' + t('f_capacity') + '</label>' +
          '<input type="number" id="capacityFilter" min="0" placeholder="' + (LANG === 'ar' ? 'مثال: ٥٠٠' : 'e.g. 500') + '" onchange="updateFilter(\'minCapacity\', this.value)">' +
        '</div>' : '') +

        (FILTER_CONFIG.exp ?
        '<div class="f-group">' +
          '<label class="f-check">' +
            '<input type="checkbox" id="exportFilter" onchange="updateFilter(\'exp\', this.checked)"> ' +
            '<span>' + t('f_export') + '</span>' +
          '</label>' +
        '</div>' : '') +
      '</aside>' +
      
      '<div>' +
        signupNudge(t('nudge_factories')) +
        '<div class="results-bar">' +
          '<span class="count"><b id="resultsCount">0</b> <span>' + t('results') + '</span></span>' +
          '<label style="font-size:13px;color:var(--ink-soft)">' +
            t('sort') + ': ' +
            '<select id="sortSelect" onchange="updateFilter(\'sort\', this.value)" style="padding:7px 10px;border:1.5px solid var(--line);border-radius:9px;margin-inline-start:6px">' +
              '<option value="name">' + t('sort_name') + '</option>' +
              '<option value="moq">' + t('sort_moq') + '</option>' +
            '</select>' +
          '</label>' +
        '</div>' +
        '<div class="card-grid" id="factoriesGrid"></div>' +
        '<div id="noResults" class="empty" style="display:none">' +
          '<div class="big">' + ICONS.search + '</div>' +
          '<b>' + t('no_results') + '</b>' +
          '<p>' + t('no_results_sub') + '</p>' +
        '</div>' +
      '</div>' +
    '</div>' +
  '</main>' +
  footerHTML();
  
  app.innerHTML = html;
  
  // Restore filter values
  restoreFilters();

  // Load the user's shortlist (for heart state), then render.
  loadFavorites(function () { renderFactoryList(); });
  });
});

function updateFilter(key, value) {
  FILTERS[key] = value;
  localStorage.setItem('sonnaFilters', JSON.stringify(FILTERS));
  renderFactoryList();
}

function setVal(id, val) { var el = document.getElementById(id); if (el) el.value = val; }
function setChecked(id, val) { var el = document.getElementById(id); if (el) el.checked = val; }

function clearAllFilters() {
  FILTERS = { q: '', industry: '', gov: '', moq: '', exp: false, cert: '', minCapacity: '', sort: 'name' };
  localStorage.removeItem('sonnaFilters');
  setVal('searchInput', '');
  setVal('industryFilter', '');
  setVal('govFilter', '');
  setVal('moqFilter', '');
  setVal('certFilter', '');
  setVal('capacityFilter', '');
  setChecked('exportFilter', false);
  setVal('sortSelect', 'name');
  renderFactoryList();
}

function restoreFilters() {
  setVal('searchInput', FILTERS.q || '');
  if (FILTERS.industry) setVal('industryFilter', FILTERS.industry);
  if (FILTERS.gov) setVal('govFilter', FILTERS.gov);
  setVal('moqFilter', FILTERS.moq || '');
  if (FILTERS.cert) setVal('certFilter', FILTERS.cert);
  setVal('capacityFilter', FILTERS.minCapacity || '');
  setChecked('exportFilter', FILTERS.exp || false);
  setVal('sortSelect', FILTERS.sort || 'name');
}

// ---- Search relevance ranking ----
function escRe(s) { return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'); }
// Damerau (optimal string alignment) similarity ratio 0..1 — counts an adjacent
// transposition (e.g. "niel" vs "nile") as a single edit, so typos rank well.
function simRatio(a, b) {
  a = a || ''; b = b || '';
  if (!a.length || !b.length) return 0;
  var m = a.length, n = b.length, d = [], i, j;
  for (i = 0; i <= m; i++) { d[i] = []; d[i][0] = i; }
  for (j = 0; j <= n; j++) d[0][j] = j;
  for (i = 1; i <= m; i++) {
    for (j = 1; j <= n; j++) {
      var cost = a.charCodeAt(i - 1) === b.charCodeAt(j - 1) ? 0 : 1;
      d[i][j] = Math.min(d[i - 1][j] + 1, d[i][j - 1] + 1, d[i - 1][j - 1] + cost);
      if (i > 1 && j > 1 && a.charCodeAt(i - 1) === b.charCodeAt(j - 2) && a.charCodeAt(i - 2) === b.charCodeAt(j - 1)) {
        d[i][j] = Math.min(d[i][j], d[i - 2][j - 2] + 1);
      }
    }
  }
  return 1 - d[m][n] / Math.max(m, n);
}
function bestWordSim(name, q) {
  var best = simRatio(name, q);
  name.split(/\s+/).forEach(function (w) { var s = simRatio(w, q); if (s > best) best = s; });
  return best;
}
// Higher = better match. Name matches dominate; other fields add a little.
function relevanceScore(f, q) {
  q = String(q || '').toLowerCase().trim();
  if (!q) return 0;
  var id = ind(f.industry);
  var best = 0;
  [f.name.en, f.name.ar].forEach(function (raw) {
    var n = String(raw || '').toLowerCase();
    if (!n) return;
    var sc = 0;
    if (n === q) sc = 100;
    else if (n.indexOf(q) === 0) sc = 88;
    else if (new RegExp('\\b' + escRe(q)).test(n)) sc = 74;   // a word starts with q
    else if (n.indexOf(q) >= 0) sc = 58;
    else { var sim = bestWordSim(n, q); sc = sim >= 0.82 ? 46 : sim >= 0.62 ? 30 : 0; }  // typo tolerance
    if (sc > best) best = sc;
  });
  var sector = (id.en + ' ' + id.ar).toLowerCase();
  if (sector.indexOf(q) >= 0) best = Math.max(best, 26);
  if (f.gov && (f.gov.en + ' ' + f.gov.ar).toLowerCase().indexOf(q) >= 0) best = Math.max(best, 18);
  var prod = IND_PRODUCTS[f.industry] || { en: [], ar: [] };
  var caps = IND_CAPS[f.industry] || { en: [], ar: [] };
  var extra = (prod.en.concat(prod.ar, caps.en, caps.ar).join(' ') + ' ' + (f.keywords || '')).toLowerCase();
  if (extra.indexOf(q) >= 0) best = Math.max(best, 12);
  return best;
}

function renderFactoryList() {
  var list = FACTORIES.filter(function(f) {
    if (FILTERS.industry && f.industry !== FILTERS.industry) return false;
    if (FILTERS.gov !== '' && FILTERS.gov != null && f.govIndex != null && String(f.govIndex) !== String(FILTERS.gov)) return false;
    if (FILTERS.moq && f.moq > Number(FILTERS.moq)) return false;
    if (FILTERS.exp && !f.exp) return false;
    if (FILTERS.cert && f.certs.indexOf(FILTERS.cert) === -1) return false;
    if (FILTERS.minCapacity && f.dailyCapacity < Number(FILTERS.minCapacity)) return false;
    if (FILTERS.q) {
      var q = FILTERS.q.toLowerCase();
      var id = ind(f.industry);
      // Which fields the keyword search looks in is controlled from the admin panel
      var fields = (window.SEARCH_CONFIG && SEARCH_CONFIG.fields) || ['name'];
      var prod = IND_PRODUCTS[f.industry] || { en: [], ar: [] };
      var caps = IND_CAPS[f.industry] || { en: [], ar: [] };
      var parts = [];
      if (fields.indexOf('name') >= 0) parts.push(f.name.en, f.name.ar);
      if (fields.indexOf('sector') >= 0) parts.push(id.en, id.ar);
      if (fields.indexOf('governorate') >= 0 && f.gov) parts.push(f.gov.en, f.gov.ar);
      if (fields.indexOf('products') >= 0) parts = parts.concat(prod.en, prod.ar);
      if (fields.indexOf('capabilities') >= 0) parts = parts.concat(caps.en, caps.ar);
      if (fields.indexOf('description') >= 0) parts.push(f.desc.en, f.desc.ar);
      if (fields.indexOf('keywords') >= 0 && f.keywords) parts.push(f.keywords);
      // Keep it if the query appears in a searched field OR is a close (typo)
      // match on the name — relevanceScore handles the fuzzy case.
      var contains = parts.join(' ').toLowerCase().indexOf(q) !== -1;
      if (!contains && relevanceScore(f, FILTERS.q) <= 0) return false;
    }
    return true;
  });

  if (FILTERS.q) {
    // Searching: closest matches first (exact/starts-with name beats a
    // buried substring), then break ties by the chosen sort.
    list.sort(function(a, b) {
      var d = relevanceScore(b, FILTERS.q) - relevanceScore(a, FILTERS.q);
      if (d) return d;
      return FILTERS.sort === 'moq' ? a.moq - b.moq : L(a.name).localeCompare(L(b.name), LANG);
    });
  } else if (FILTERS.sort === 'moq') {
    list.sort(function(a, b) { return a.moq - b.moq; });
  } else {
    list.sort(function(a, b) { return L(a.name).localeCompare(L(b.name), LANG); });
  }
  
  document.getElementById('resultsCount').textContent = num(list.length);
  
  if (list.length > 0) {
    document.getElementById('factoriesGrid').innerHTML = list.map(factoryCardHTML).join('');
    document.getElementById('factoriesGrid').style.display = '';
    document.getElementById('noResults').style.display = 'none';
  } else {
    document.getElementById('factoriesGrid').style.display = 'none';
    document.getElementById('noResults').style.display = '';
  }
}
</script>
