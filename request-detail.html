<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script>(function(){try{var l=localStorage.getItem('sonnaLang');if(l==='en'){document.documentElement.lang='en';document.documentElement.dir='ltr';}else if(l==='ar'){document.documentElement.lang='ar';document.documentElement.dir='rtl';}}catch(e){}})();</script>
<title>تفاصيل الطلب | صُنّاع</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Alexandria:wght@400;500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=Cairo:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

<div id="app"></div>

<script src="assets/js/icons.js"></script>
<script src="assets/js/lang.js"></script>
<script src="assets/js/data.js"></script>
<script src="assets/js/supabase-config.js"></script>
<script src="assets/js/store.js"></script>
<script src="assets/js/utils.js"></script>
<script src="assets/js/auth.js"></script>
<script src="assets/js/components.js"></script>
<script src="assets/js/chat.js"></script>
<script>
function daysAgo(iso) { return Math.max(0, Math.floor((Date.now() - new Date(iso).getTime()) / 86400000)); }

function renderRequest(r) {
  var me = window.Chat && Chat.myId ? Chat.myId() : null;
  var mine = me && String(r.owner) === String(me);
  var gov = (r.gov != null && GOVS[r.gov]) ? L(GOVS[r.gov]) : '—';
  var media = r.media || [];
  var titleAttr = esc(String(r.title || '')).replace(/'/g, '&#39;');
  var nameAttr = esc(String(r.owner_name || 'User')).replace(/'/g, '&#39;');

  var mediaHTML = media.length
    ? '<div class="panel"><h2>' + t('req_samples') + '</h2><div class="gallery">' +
        media.map(function (m) {
          return m.type === 'video'
            ? '<div class="ph"><video src="' + encodeURI(m.url) + '" controls playsinline style="width:100%;height:100%;object-fit:cover"></video></div>'
            : '<a class="ph" href="' + encodeURI(m.url) + '" target="_blank" style="background-image:url(\'' + safeUrl(m.url) + '\');background-size:cover;background-position:center"></a>';
        }).join('') +
      '</div></div>'
    : '';

  var contactBox = mine
    ? '<div class="panel" style="margin:18px 0 0;background:var(--teal-tint);border-color:transparent">' +
        '<h2>' + t('contact_requester') + '</h2>' +
        '<p style="font-weight:600;color:var(--ink)" dir="ltr">' + esc(r.contact || '') + '</p>' +
        '<p style="font-size:12.5px;margin-top:8px">' + t('req_yours_note') + '</p></div>'
    : '<div class="panel" style="margin:18px 0 0;background:var(--teal-tint);border-color:transparent">' +
        '<h2>' + t('req_interested') + '</h2>' +
        '<p style="font-size:13px;margin-bottom:12px">' + t('req_message_sub') + '</p>' +
        '<button class="btn btn-primary" onclick="Chat.openWith(\'' + esc(r.owner) + '\',\'' + nameAttr + '\',{requestId:\'' + esc(r.id) + '\',requestTitle:\'' + titleAttr + '\'})">' + ICONS.chat + ' ' + t('req_message') + '</button>' +
        '<p style="font-size:12.5px;margin-top:12px;color:var(--ink-soft)">' + t('req_contact_alt') + ' <span dir="ltr" style="font-weight:600">' + esc(r.contact || '—') + '</span></p></div>';

  var app = document.getElementById('app');
  app.innerHTML = headerHTML() + mobileMenuHTML() + '<main>' +
    '<div class="container">' +
      '<a href="requests.html" class="back-btn">' + (LANG === 'ar' ? '→' : '←') + ' ' + t('req_title') + '</a>' +
    '</div>' +
    '<div class="container" style="padding:18px 24px 64px;max-width:860px">' +
      '<div class="panel">' +
        '<div class="req-detail-head">' +
          '<div style="display:flex;gap:14px;align-items:center">' +
            '<div style="width:56px;height:56px;border-radius:14px;background:var(--mist);display:grid;place-items:center;font-size:26px">' + ICONS.clipboard + '</div>' +
            '<div>' +
              '<h1 style="font-size:22px;font-weight:800">' + esc(r.title || '') + '</h1>' +
              '<span style="font-size:13px;color:var(--ink-soft)">' +
                t('posted') + ' ' + STR[LANG].days_ago(daysAgo(r.created_at)) + ' · ' + t('by') + ' <b>' + esc(r.owner_name || 'User') + '</b>' +
                ' · ' + ICONS.eye + ' <span id="reqViews">…</span> ' + t('views') +
              '</span>' +
            '</div>' +
          '</div>' +
        '</div>' +
        '<p style="margin:18px 0;color:var(--ink);font-size:14.5px;white-space:pre-line">' + esc(r.description || '') + '</p>' +
        '<div class="spec-grid">' +
          '<div class="spec"><div class="k">' + t('qty') + '</div><div class="v">' + esc(r.qty || '—') + ' ' + t('units') + '</div></div>' +
          '<div class="spec"><div class="k">' + t('budget') + '</div><div class="v">' + (r.budget ? esc(r.budget) + ' ' + t('egp') : t('budget_na')) + '</div></div>' +
          '<div class="spec"><div class="k">' + t('materials') + '</div><div class="v">' + esc(r.material || '—') + '</div></div>' +
          '<div class="spec"><div class="k">' + t('deliver_to') + '</div><div class="v">' + ICONS.pin + ' ' + gov + '</div></div>' +
        '</div>' +
        mediaHTML +
        contactBox +
      '</div>' +
    '</div>' +
  '</main>' +
  footerHTML();
  if (window.updateChatBadge) updateChatBadge();
  if (window.loadViews) loadViews('request', r.id, 'reqViews');
}

document.addEventListener('DOMContentLoaded', function() {
  AdminStore.bootstrap().then(function() {
  var savedLang = localStorage.getItem('sonnaLang');
  if (savedLang === 'en' || savedLang === 'ar') {
    LANG = savedLang;
  }
  document.documentElement.lang = LANG;
  document.documentElement.dir = LANG === 'ar' ? 'rtl' : 'ltr';

  // Members-only: require login to view request details
  if (!window.Auth || !Auth.isLoggedIn()) {
    document.getElementById('app').innerHTML = headerHTML() + mobileMenuHTML() + '<main>' + Auth.gateHTML() + '</main>' + footerHTML();
    return;
  }

  var params = new URLSearchParams(window.location.search);
  var requestId = params.get('id');
  if (!requestId) { window.location.href = 'requests.html'; return; }

  AdminStore.getRequest(requestId).then(function (r) {
    if (!r) { window.location.href = 'requests.html'; return; }
    renderRequest(r);
  }).catch(function () { window.location.href = 'requests.html'; });
  });
});
</script>
</body>
</html>
