<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script>(function(){try{var l=localStorage.getItem('sonnaLang');if(l==='en'){document.documentElement.lang='en';document.documentElement.dir='ltr';}else if(l==='ar'){document.documentElement.lang='ar';document.documentElement.dir='rtl';}var th=localStorage.getItem('sonnaTheme');if(!th){th='light';}document.documentElement.setAttribute('data-theme',th);}catch(e){}})();</script>
<title>تفاصيل الطلب | صُنّاع</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Alexandria:wght@400;500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=Cairo:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="icon" type="image/png" href="assets/favicon.png">
<link rel="apple-touch-icon" href="assets/favicon.png">
<link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

<div id="app"></div>

<script src="assets/js/icons.js"></script>
<script src="assets/js/lang.js"></script>
<script src="assets/js/data.js"></script>
<script src="assets/js/supabase-config.js"></script>
<script src="assets/js/store.js"></script>
<script src="assets/js/utils.js"></script>
<script src="assets/js/auth.js"></script>
<script src="assets/js/components.js"></script>
<script src="assets/js/chat.js"></script>
<script>
function daysAgo(iso) { return Math.max(0, Math.floor((Date.now() - new Date(iso).getTime()) / 86400000)); }

function renderRequest(r) {
  var me = window.Chat && Chat.myId ? Chat.myId() : null;
  var mine = me && String(r.owner) === String(me);
  var gov = (r.gov != null && GOVS[r.gov]) ? L(GOVS[r.gov]) : '—';
  var media = r.media || [];
  var titleAttr = esc(String(r.title || '')).replace(/'/g, '&#39;');
  var nameAttr = esc(String(r.owner_name || 'User')).replace(/'/g, '&#39;');

  var mediaHTML = media.length
    ? '<div class="panel"><h2>' + t('req_samples') + '</h2><div class="gallery">' + galleryHTML(media) + '</div></div>'
    : '';

  function digitsOnly(s) { return String(s || '').replace(/[^0-9]/g, ''); }
  function cMethod(href, icon, label, val, external) {
    return '<a class="req-contact" href="' + href + '"' + (external ? ' target="_blank" rel="noopener"' : '') + '>' +
      '<span class="rc-ic">' + icon + '</span>' +
      '<span class="rc-txt"><b>' + label + '</b><span dir="ltr">' + esc(val) + '</span></span></a>';
  }
  function contactMethods(r) {
    var out = '';
    if (r.contact_phone)    out += cMethod('tel:' + digitsOnly(r.contact_phone), ICONS.phone, t('call'), r.contact_phone);
    if (r.contact_whatsapp) out += cMethod('https://wa.me/' + digitsOnly(r.contact_whatsapp), ICONS.whatsapp, t('whatsapp'), r.contact_whatsapp, true);
    if (r.contact_email)    out += cMethod('mailto:' + r.contact_email, ICONS.envelope, t('email'), r.contact_email, true);
    // Legacy single-field requests.
    if (!out && r.contact)  out = '<p dir="ltr" style="font-weight:600;overflow-wrap:anywhere">' + esc(r.contact) + '</p>';
    return out ? '<div class="req-contacts">' + out + '</div>' : '';
  }

  var contactBox = !signedIn()
    ? '<div class="panel" style="margin:18px 0 0;background:var(--teal-tint);border-color:transparent">' +
        '<h2>' + t('req_interested') + '</h2>' +
        '<p style="font-size:13px;margin-bottom:12px">' + t('req_join_note') + '</p>' +
        '<button class="btn btn-primary" onclick="openAuthModal(\'signup\')">' + t('signup') + '</button> ' +
        '<button class="btn btn-ghost" onclick="openAuthModal(\'login\')">' + t('login') + '</button></div>'
    : mine
    ? '<div class="panel" style="margin:18px 0 0;background:var(--teal-tint);border-color:transparent">' +
        '<h2>' + t('contact_requester') + '</h2>' +
        (contactMethods(r) || '<p class="muted" style="font-size:13px">' + t('req_no_contact') + '</p>') +
        '<p style="font-size:12.5px;margin-top:8px">' + t('req_yours_note') + '</p></div>'
    : !window.MY_VERIFIED_OWNER
    // Signed in, but not a verified factory owner — cannot contact buyers.
    ? '<div class="panel" style="margin:18px 0 0;background:var(--teal-tint);border-color:transparent">' +
        '<h2>' + t('req_verify_to_contact') + '</h2>' +
        '<p style="font-size:13px;margin-bottom:12px">' + t('req_verify_contact_note') + '</p>' +
        '<a class="btn btn-primary" href="my-factory.html">' + ICONS.shieldCheck + ' ' + t('req_verify_contact_cta') + '</a></div>'
    : '<div class="panel" style="margin:18px 0 0;background:var(--teal-tint);border-color:transparent">' +
        '<h2>' + t('req_interested') + '</h2>' +
        '<p style="font-size:13px;margin-bottom:12px">' + t('req_message_sub') + '</p>' +
        '<button class="btn btn-primary" onclick="Chat.openWith(\'' + esc(r.owner) + '\',\'' + nameAttr + '\',{requestId:\'' + esc(r.id) + '\',requestTitle:\'' + titleAttr + '\'})">' + ICONS.chat + ' ' + t('req_message') + '</button>' +
        (contactMethods(r) ? '<p style="font-size:12.5px;margin:14px 0 8px;color:var(--ink-soft)">' + t('req_contact_alt') + '</p>' + contactMethods(r) : '') +
        '</div>';

  window.CURRENT_REQ = r;   // for the owner's Edit action
  var ownerActions = mine
    ? '<div class="req-owner-actions">' +
        '<button class="btn btn-ghost btn-sm" onclick="editThisRequest()">' + ICONS.wrench + ' ' + t('req_edit') + '</button>' +
        '<button class="btn btn-ghost btn-sm req-del-btn" onclick="deleteThisRequest()">' + ICONS.trash + ' ' + t('req_delete') + '</button>' +
      '</div>'
    : '';

  var app = document.getElementById('app');
  app.innerHTML = headerHTML() + mobileMenuHTML() + '<main>' +
    '<div class="container">' +
      '<a href="requests.html" class="back-btn">' + (LANG === 'ar' ? '→' : '←') + ' ' + t('req_title') + '</a>' +
    '</div>' +
    '<div class="container" style="padding:18px 24px 64px;max-width:860px">' +
      '<div class="panel">' +
        '<div class="req-detail-head">' +
          '<div style="display:flex;gap:14px;align-items:center">' +
            '<div style="width:56px;height:56px;border-radius:14px;background:var(--mist);display:grid;place-items:center;font-size:26px">' + ICONS.clipboard + '</div>' +
            '<div>' +
              '<h1 style="font-size:22px;font-weight:800">' + esc(r.title || '') + '</h1>' +
              '<span style="font-size:13px;color:var(--ink-soft)">' +
                t('posted') + ' ' + STR[LANG].days_ago(daysAgo(r.created_at)) + ' · ' + t('by') + ' <b>' + esc(r.owner_name || 'User') + '</b>' +
                ' · ' + ICONS.eye + ' <span id="reqViews">…</span> ' + t('views') +
              '</span>' +
            '</div>' +
          '</div>' +
          ownerActions +
        '</div>' +
        '<p style="margin:18px 0;color:var(--ink);font-size:14.5px;white-space:pre-line;overflow-wrap:anywhere;word-break:break-word">' + esc(r.description || '') + '</p>' +
        '<div class="spec-grid">' +
          '<div class="spec"><div class="k">' + t('qty') + '</div><div class="v">' + esc(r.qty || '—') + ' ' + t('units') + '</div></div>' +
          '<div class="spec"><div class="k">' + t('budget') + '</div><div class="v">' + (r.budget ? esc(r.budget) + ' ' + t('egp') : t('budget_na')) + '</div></div>' +
          '<div class="spec"><div class="k">' + t('materials') + '</div><div class="v">' + esc(r.material || '—') + '</div></div>' +
          (signedIn() ? '<div class="spec"><div class="k">' + t('deliver_to') + '</div><div class="v">' + ICONS.pin + ' ' + gov + '</div></div>' : '') +
        '</div>' +
        mediaHTML +
        contactBox +
        ((window.Auth && Auth.isLoggedIn() && !mine) ? '<div style="text-align:center;margin-top:14px">' + reportBtnHTML('request', r.id, r.title || '') + '</div>' : '') +
      '</div>' +
    '</div>' +
  '</main>' +
  footerHTML();
  if (window.updateChatBadge) updateChatBadge();
  if (window.loadViews) loadViews('request', r.id, 'reqViews');
}

// ---- Owner actions ----
function editThisRequest() {
  if (window.CURRENT_REQ && window.openRequestForm) openRequestForm(window.CURRENT_REQ);
}
function deleteThisRequest() {
  var r = window.CURRENT_REQ;
  if (!r || !window.Auth) return;
  if (!confirm(t('req_delete_confirm'))) return;
  Auth.deleteRequest(r.id)
    .then(function () { toast(t('req_deleted')); setTimeout(function () { window.location.href = 'requests.html'; }, 500); })
    .catch(function (e) { alert((t('req_delete_fail') || 'Could not delete') + ': ' + (e.message || e)); });
}

document.addEventListener('DOMContentLoaded', function() {
  AdminStore.bootstrap().then(function() {
  var savedLang = localStorage.getItem('sonnaLang');
  if (savedLang === 'en' || savedLang === 'ar') {
    LANG = savedLang;
  }
  document.documentElement.lang = LANG;
  document.documentElement.dir = LANG === 'ar' ? 'rtl' : 'ltr';

  var params = new URLSearchParams(window.location.search);
  var requestId = params.get('id');
  if (!requestId) { window.location.href = 'requests.html'; return; }

  var verChk = (window.Auth && Auth.isLoggedIn())
    ? Auth.isVerifiedOwner().catch(function () { return false; })
    : Promise.resolve(false);

  Promise.all([AdminStore.getRequest(requestId), verChk]).then(function (res) {
    var r = res[0];
    window.MY_VERIFIED_OWNER = !!res[1];
    if (!r) { window.location.href = 'requests.html'; return; }
    renderRequest(r);
  }).catch(function () { window.location.href = 'requests.html'; });
  });
});
</script>
</body>
</html>
