<script>
// ---- Request a quote (RFQ) ----
function openRFQModal(factoryId, factoryName, ownerId) {
  if (!(window.Auth && Auth.isLoggedIn())) { if (window.openAuthModal) openAuthModal('login'); return; }
  var bd = document.createElement('div');
  bd.className = 'modal-backdrop';
  bd.addEventListener('click', function (e) { if (e.target === bd) bd.remove(); });
  bd.innerHTML =
    '<div class="modal">' +
      '<h2>' + t('rfq_title') + '</h2>' +
      '<p class="sub">' + esc(factoryName) + '</p>' +
      '<div class="au-err" id="rfqErr" style="display:none"></div>' +
      '<div class="form-grid">' +
        '<div class="form-field full"><label>' + t('rfq_product') + ' *</label><input id="rfq_title" placeholder="' + t('rfq_product_ph') + '"></div>' +
        '<div class="form-field full"><label>' + t('rfq_details') + ' *</label><textarea id="rfq_details" rows="3" placeholder="' + t('rfq_details_ph') + '"></textarea></div>' +
        '<div class="form-field"><label>' + t('rfq_qty') + ' *</label><input id="rfq_qty" type="text" placeholder="1000"></div>' +
        '<div class="form-field"><label>' + t('rfq_target') + ' <span class="opt">(' + t('optional') + ')</span></label><input id="rfq_target" type="text"></div>' +
        '<div class="form-field full"><label>' + t('rfq_needed') + ' <span class="opt">(' + t('optional') + ')</span></label><input id="rfq_needed" type="text" placeholder="' + t('rfq_needed_ph') + '"></div>' +
      '</div>' +
      '<div class="modal-actions">' +
        '<button class="btn btn-ghost" onclick="this.closest(\'.modal-backdrop\').remove()">' + t('cancel') + '</button>' +
        '<button class="btn btn-primary" id="rfqSubmit">' + t('rfq_send') + '</button>' +
      '</div>' +
    '</div>';
  document.body.appendChild(bd);
  bd.querySelector('#rfqSubmit').onclick = function () {
    var v = function (id) { var e = bd.querySelector('#' + id); return e ? e.value.trim() : ''; };
    var title = v('rfq_title'), details = v('rfq_details'), qty = v('rfq_qty');
    var err = bd.querySelector('#rfqErr');
    if (!title || !details || !qty) { err.textContent = t('fill_required'); err.style.display = 'block'; return; }
    var btn = bd.querySelector('#rfqSubmit'); btn.disabled = true; btn.textContent = '…';
    Auth.createRFQ({ id: factoryId, name: factoryName, ownerId: ownerId },
      { title: title, details: details, qty: qty, target_price: v('rfq_target') || null, needed_by: v('rfq_needed') || null })
      .then(function () { bd.remove(); toast(t('rfq_sent')); })
      .catch(function (e2) { btn.disabled = false; btn.textContent = t('rfq_send'); err.textContent = (t('rfq_fail') || 'Could not send') + ': ' + (e2.message || e2); err.style.display = 'block'; });
  };
}

function starsHTML(rating) {
  var s = ''; for (var i = 0; i < 5; i++) s += i < Math.round(rating) ? ICONS.star : ICONS.starOutline; return s;
}

// Response-rate chip in the profile header (only meaningful with enough threads).
function loadResponseStats(ownerId) {
  if (!ownerId || !AdminStore.fetchResponseStats) return;
  AdminStore.fetchResponseStats(ownerId).then(function (st) {
    var el = document.getElementById('respStat');
    if (!el || !st || !st.threads || st.threads < 3 || st.rate == null) return;
    var label = ICONS.chat + ' ' + t('resp_rate').replace('{rate}', st.rate);
    if (st.avg_minutes != null) {
      var mins = Number(st.avg_minutes);
      var within = mins < 60 ? Math.max(1, Math.round(mins)) + ' ' + t('resp_min')
                 : mins < 1440 ? Math.round(mins / 60) + ' ' + t('resp_hr')
                 : Math.round(mins / 1440) + ' ' + t('resp_day');
      label += ' · ' + t('resp_within').replace('{time}', within);
    }
    el.innerHTML = label; el.style.display = '';
  });
}

// Reviews panel: summary, list, and a context-aware "write a review" control.
function loadFactoryReviews(factoryId, ownerId, factoryName) {
  var panel = document.getElementById('reviewsPanel');
  if (!panel) return;
  Promise.all([
    AdminStore.fetchReviews(factoryId),
    (window.Auth && Auth.isLoggedIn()) ? Auth.myReview(factoryId) : Promise.resolve(null),
    (window.Auth && Auth.isLoggedIn() && ownerId) ? Auth.canReview(ownerId) : Promise.resolve(false)
  ]).then(function (res) {
    var reviews = res[0] || [], mine = res[1], canRev = res[2];
    var isOwner = window.Auth && Auth.user() && ownerId && String(Auth.user().id) === String(ownerId);
    var avg = reviews.length ? Math.round(reviews.reduce(function (s, r) { return s + r.rating; }, 0) / reviews.length * 10) / 10 : 0;

    var head = '<h2>' + t('reviews_title') + (reviews.length ? ' <span class="rating-count">(' + num(reviews.length) + ')</span>' : '') + '</h2>';
    var summary = reviews.length
      ? '<div class="rating-stars" style="margin-bottom:12px">' + starsHTML(avg) + ' <span class="rating-value">' + avg + '</span></div>'
      : '<p class="muted" style="margin-bottom:12px">' + t('no_reviews_yet') + '</p>';

    // The write-review control depends on who is viewing.
    var cta = '';
    if (isOwner) { cta = ''; }
    else if (!(window.Auth && Auth.isLoggedIn())) {
      cta = '<button class="btn btn-ghost btn-sm" onclick="openAuthModal(\'login\')">' + t('review_signin') + '</button>';
    } else if (!canRev) {
      cta = '<p class="muted" style="font-size:13px">' + ICONS.chat + ' ' + t('review_need_msg') + '</p>';
    } else {
      cta = '<button class="btn btn-primary btn-sm" onclick="openReviewModal(\'' + esc(factoryId) + '\',\'' + esc(String(factoryName)).replace(/\x27/g, '&#39;') + '\')">' +
        (mine ? t('review_edit') : t('review_write')) + '</button>';
    }
    // Always-visible disclaimer explaining how reviews work.
    var disclaimer = '<details class="review-disclaimer"><summary>' + ICONS.clipboard + ' ' + t('review_how') + '</summary>' +
      '<p>' + t('review_disclaimer') + '</p></details>';

    var list = reviews.length
      ? '<div class="review-list">' + reviews.map(function (r) {
          return '<div class="review-item">' +
            '<div class="review-top"><span class="review-name">' + esc(r.reviewer_name || 'User') + '</span>' +
              '<span class="review-stars">' + starsHTML(r.rating) + '</span></div>' +
            (r.body ? '<p class="review-body">' + esc(r.body) + '</p>' : '') +
            '<div class="review-date">' + new Date(r.created_at).toLocaleDateString() + '</div>' +
          '</div>';
        }).join('') + '</div>'
      : '';

    panel.innerHTML = head + summary + '<div style="margin-bottom:10px">' + cta + '</div>' + disclaimer + list;
  });
}

var _REVIEW_CTX = null;
function openReviewModal(factoryId, factoryName) {
  Auth.myReview(factoryId).then(function (mine) {
    _REVIEW_CTX = { factoryId: factoryId, factoryName: factoryName, rating: mine ? mine.rating : 0 };
    var bd = document.createElement('div');
    bd.className = 'modal-backdrop';
    bd.addEventListener('click', function (e) { if (e.target === bd) bd.remove(); });
    bd.innerHTML =
      '<div class="modal">' +
        '<h2>' + t('review_write') + '</h2>' +
        '<p class="sub">' + esc(factoryName) + '</p>' +
        '<div class="au-err" id="rvErr" style="display:none"></div>' +
        '<div class="star-picker" id="starPicker">' +
          [1,2,3,4,5].map(function (n) { return '<button type="button" class="star-btn" data-n="' + n + '" onclick="setReviewStars(' + n + ')">' + ICONS.starOutline + '</button>'; }).join('') +
        '</div>' +
        '<div class="form-field full" style="margin-top:12px"><label>' + t('review_comment') + ' <span class="opt">(' + t('optional') + ')</span></label>' +
          '<textarea id="rvBody" rows="4">' + (mine ? esc(mine.body || '') : '') + '</textarea></div>' +
        '<p class="muted" style="font-size:12px;margin-top:4px">' + t('review_modal_note') + '</p>' +
        '<div class="modal-actions">' +
          '<button class="btn btn-ghost" onclick="this.closest(\'.modal-backdrop\').remove()">' + t('cancel') + '</button>' +
          '<button class="btn btn-primary" id="rvSubmit">' + t('review_submit') + '</button>' +
        '</div>' +
      '</div>';
    document.body.appendChild(bd);
    setReviewStars(_REVIEW_CTX.rating);
    bd.querySelector('#rvSubmit').onclick = function () { submitReviewForm(bd); };
  });
}
function setReviewStars(n) {
  _REVIEW_CTX.rating = n;
  document.querySelectorAll('#starPicker .star-btn').forEach(function (b) {
    b.innerHTML = Number(b.dataset.n) <= n ? ICONS.star : ICONS.starOutline;
    b.classList.toggle('on', Number(b.dataset.n) <= n);
  });
}
function submitReviewForm(bd) {
  if (!_REVIEW_CTX.rating) { var e = bd.querySelector('#rvErr'); e.textContent = t('review_pick'); e.style.display = 'block'; return; }
  var body = bd.querySelector('#rvBody').value.trim();
  var btn = bd.querySelector('#rvSubmit'); btn.disabled = true; btn.textContent = '…';
  Auth.submitReview(_REVIEW_CTX.factoryId, _REVIEW_CTX.rating, body).then(function () {
    bd.remove();
    location.reload();   // refresh reviews list + header aggregate rating
  }).catch(function (err) {
    btn.disabled = false; btn.textContent = t('review_submit');
    var e = bd.querySelector('#rvErr'); e.textContent = (t('review_fail') || 'Could not submit') + ': ' + (err.message || err); e.style.display = 'block';
  });
}

document.addEventListener('DOMContentLoaded', function() {
  AdminStore.bootstrap().then(function() {
  var savedLang = localStorage.getItem('sonnaLang');
  if (savedLang === 'en' || savedLang === 'ar') {
    LANG = savedLang;
  }
  document.documentElement.lang = LANG;
  document.documentElement.dir = LANG === 'ar' ? 'rtl' : 'ltr';

  var params = new URLSearchParams(window.location.search);
  var factoryId = params.get('id');
  
  if (!factoryId) {
    window.location.href = 'factories.html';
    return;
  }
  
  var f = FACTORIES.find(function(x) { return x.id === factoryId; });
  if (!f) {
    window.location.href = 'factories.html';
    return;
  }
  
  var id = ind(f.industry);
  var slug = f.name.en.toLowerCase().replace(/[^a-z]+/g, '');
  // Unverified user submissions show name + sector only; all other panels are
  // locked until an admin verifies the factory.
  var locked = (f.verified === false);
  function lockedPanel(title) {
    return '<div class="panel locked-panel"><h2>' + title + '</h2>' +
      '<div class="lock-note">' + ICONS.clock + ' ' + t('mf_locked_note') + '</div></div>';
  }
  function lockedLayout() {
    return '<div>' +
      lockedPanel(t('about')) + lockedPanel(t('services_title')) + lockedPanel(t('products')) +
      lockedPanel(t('capabilities')) + lockedPanel(t('gallery')) + lockedPanel(t('details')) +
    '</div>' +
    '<aside class="contact-panel">' + lockedPanel(t('contact_title')) + '</aside>';
  }

  function stars(rating) {
    var s = '';
    for (var i = 0; i < 5; i++) s += i < Math.round(rating) ? ICONS.star : ICONS.starOutline;
    return s;
  }
  
  // Per-factory lists (fall back to the sector's defaults if a factory has none)
  function nonEmpty(o){ return o && ((o.en && o.en.length) || (o.ar && o.ar.length)); }
  var svcNames;
  if (Array.isArray(f.services)) {
    var sset = IND_SERVICES[f.industry] || {en:[],ar:[]};
    svcNames = f.services.map(function(s){
      if (LANG === 'ar') { for (var j=0;j<(sset.en||[]).length;j++){ if (sset.en[j].name === s.name) return (sset.ar[j]||sset.en[j]).name; } }
      return s.name;
    });
  } else { svcNames = L(f.services || {en:[],ar:[]}); }
  var prodList = nonEmpty(f.products) ? f.products : (IND_PRODUCTS[f.industry] || {en:[],ar:[]});
  var capList  = nonEmpty(f.capabilities) ? f.capabilities : (IND_CAPS[f.industry] || {en:[],ar:[]});
  var hoursTxt = (f.hours && (f.hours.en || f.hours.ar)) ? L(f.hours) : t('hours_val');
  var waNum = (f.whatsapp || f.phone || '').replace(/[^0-9]/g,'');
  var emailAddr = f.email || ('info@' + slug + '.example');
  var siteUrl = f.website || (slug + '.example.com');
  
  var app = document.getElementById('app');
  app.innerHTML = headerHTML() + mobileMenuHTML() + '<main>' +
    '<div class="container">' +
      '<a href="factories.html" class="back-btn">' + (LANG === 'ar' ? '→' : '←') + ' ' + t('back') + '</a>' +
    '</div>' +
    '<div class="container" style="margin-top:14px">' +
      '<div class="profile-cover" style="' + (f.cover ? 'background:#0000;background-image:url(\'' + safeUrl(f.cover) + '\');background-size:cover;background-position:center' : 'background:' + grad(id.g)) + ';border-radius:20px">' +
        (locked ? '' : '<span class="pcode">' + factoryCode(f) + '</span>') +
        (locked ? '' : favBtnHTML(f.id)) +
        (f.cover ? '' : '<span class="cover-ic">' + id.icon + '</span>') +
      '</div>' +
      '<div class="profile-top">' +
        '<div class="profile-card">' +
          (f.logo
            ? '<div class="profile-logo" style="background-image:url(\'' + safeUrl(f.logo) + '\');background-size:cover;background-position:center"></div>'
            : '<div class="profile-logo">' + L(f.name).charAt(0) + '</div>') +
          '<div class="profile-main">' +
            '<h1>' + esc(L(f.name)) + '</h1>' +
            '<div class="meta" style="color:var(--ink-soft);font-size:13.5px">' +
              id.icon + ' ' + L({en: id.en, ar: id.ar}) + (locked ? '' : (signedIn() ? ' · ' + ICONS.pin + ' ' + L(f.gov) : '') + ' · ' + t('est') + ' ' + num(f.yr)) +
            '</div>' +
            (locked
              ? '<div class="badge-row">' + verifyBadge(f) + '</div>'
              : (f.reviewCount > 0
                  ? '<div class="rating-stars" style="margin-top:8px">' +
                      stars(f.rating) + ' <span class="rating-value">' + f.rating + '</span> <span class="rating-count">(' + num(f.reviewCount) + ' ' + t('rating_reviews') + ')</span>' +
                    '</div>'
                  : '<div class="rating-stars" style="margin-top:8px;color:var(--ink-soft);font-size:13px">' + t('no_reviews_yet') + '</div>') +
                '<div class="badge-row">' +
                  verifyBadge(f) +
                  '<span class="chip" id="respStat" style="display:none"></span>' +
                  '<span class="chip teal">' + t('moq') + ': ' + num(f.moq) + ' ' + t('units') + '</span>' +
                  (f.exp ? '<span class="chip amber">' + ICONS.globe + ' ' + t('exports') + '</span>' : '') +
                  f.certs.map(function(c) { return '<span class="chip">' + ICONS.check + ' ' + c + '</span>'; }).join('') +
                  '<span class="capacity-badge daily">' + ICONS.chartBar + ' ' + t('daily_capacity') + ': ' + num(f.dailyCapacity) + '</span>' +
                  '<span class="capacity-badge monthly">' + ICONS.chartLine + ' ' + t('monthly_capacity') + ': ' + num(f.monthlyCapacity) + '</span>' +
                  '<span class="chip">' + ICONS.eye + ' <span id="facViews">…</span> ' + t('views') + '</span>' +
                '</div>') +
          '</div>' +
        '</div>' +
      '</div>' +
      
      '<div class="profile-layout">' +
        (locked ? lockedLayout() :
        '<div>' +
          '<div class="panel">' +
            '<h2>' + t('about') + '</h2>' +
            '<p>' + esc(L(f.desc)) + '</p>' +
          '</div>' +
          '<div class="panel">' +
            '<h2>' + t('services_title') + '</h2>' +
            (svcNames.length > 0
              ? '<div class="services-grid">' + svcNames.map(function(name) { return '<div class="service-card"><span class="svc-icon">' + ICONS.wrench + '</span><span>' + esc(name) + '</span></div>'; }).join('') + '</div>'
              : '<p>' + t('no_services') + '</p>') +
          '</div>' +
          '<div class="panel">' +
            '<h2>' + t('products') + '</h2>' +
            '<div class="chip-row">' + L(prodList).map(function(p) { return '<span class="chip" style="font-size:13px;padding:7px 14px">' + esc(p) + '</span>'; }).join('') + '</div>' +
          '</div>' +
          '<div class="panel">' +
            '<h2>' + t('capabilities') + '</h2>' +
            '<div class="chip-row">' + L(capList).map(function(p) { return '<span class="chip teal" style="font-size:13px;padding:7px 14px">' + esc(p) + '</span>'; }).join('') + '</div>' +
          '</div>' +
          '<div class="panel">' +
            '<h2>' + t('gallery') + '</h2>' +
            '<div class="gallery">' +
              ((f.media && f.media.length)
                ? galleryHTML(f.media)
                : [0,1,2,3,4,5].map(function(n) { return '<div class="ph" style="background:' + grad(id.g) + ';opacity:' + (1 - n * 0.09) + '">' + (n < 3 ? ICONS.camera : id.icon) + '</div>'; }).join('')) +
            '</div>' +
          '</div>' +
          '<div class="panel">' +
            '<h2>' + t('details') + '</h2>' +
            '<div class="spec-grid">' +
              '<div class="spec"><div class="k">' + t('established') + '</div><div class="v">' + num(f.yr) + '</div></div>' +
              '<div class="spec"><div class="k">' + t('employees') + '</div><div class="v">' + f.emp + '</div></div>' +
              (signedIn() ? '<div class="spec"><div class="k">' + t('location') + '</div><div class="v">' + ICONS.pin + ' ' + L(f.gov) + '</div></div>' : '') +
              '<div class="spec"><div class="k">' + t('hours') + '</div><div class="v">' + esc(hoursTxt) + '</div></div>' +
              '<div class="spec"><div class="k">' + t('moq') + '</div><div class="v">' + num(f.moq) + ' ' + t('units') + '</div></div>' +
              '<div class="spec"><div class="k">' + t('certifications') + '</div><div class="v">' + (f.certs.length ? f.certs.join(' · ') : '—') + '</div></div>' +
            '</div>' +
          '</div>' +
          '<div class="panel" id="reviewsPanel"><h2>' + t('reviews_title') + '</h2>' + loadingHTML() + '</div>' +
        '</div>' +

        '<aside class="contact-panel">' +
          '<div class="panel">' +
            '<h2>' + t('contact_title') + '</h2>' +
            (!signedIn()
              ? '<p style="margin-bottom:14px;font-size:13px;color:var(--ink-soft)">' + t('contact_locked') + '</p>' +
                '<button class="btn btn-primary" style="width:100%;margin-bottom:8px" onclick="openAuthModal(\'signup\')">' + t('signup') + '</button>' +
                '<button class="btn btn-ghost" style="width:100%" onclick="openAuthModal(\'login\')">' + t('login') + '</button>'
              : (
            (f.ownerId && (!window.Chat || String(Chat.myId()) !== String(f.ownerId))
              ? '<button class="btn btn-primary" style="width:100%;margin-bottom:8px" onclick="Chat.openWith(\'' + esc(f.ownerId) + '\',\'' + esc(L(f.name)).replace(/\x27/g, '&#39;') + '\')">' + ICONS.chat + ' ' + t('msg_supplier') + '</button>' +
                '<button class="btn btn-ghost" style="width:100%;margin-bottom:12px" onclick="openRFQModal(\'' + esc(f.id) + '\',\'' + esc(L(f.name)).replace(/\x27/g, '&#39;') + '\',\'' + esc(f.ownerId) + '\')">' + ICONS.clipboard + ' ' + t('rfq_cta') + '</button>'
              : '') +
            '<a class="contact-btn" href="tel:' + f.phone.replace(/\s/g, '') + '">' +
              '<span class="ci" style="background:var(--teal-tint)">' + ICONS.phone + '</span>' +
              '<span>' + t('call') + '<small dir="ltr">' + f.phone + '</small></span>' +
            '</a>' +
            '<a class="contact-btn" href="' + (waNum ? 'https://wa.me/' + waNum : '#') + '"' + (waNum ? ' target="_blank"' : ' onclick="return false"') + '>' +
              '<span class="ci" style="background:#E7F6EC">' + ICONS.chat + '</span>' +
              '<span>' + t('whatsapp') + '<small dir="ltr">' + esc(f.whatsapp || f.phone) + '</small></span>' +
            '</a>' +
            '<a class="contact-btn" href="mailto:' + esc(emailAddr) + '">' +
              '<span class="ci" style="background:#FDF0E0">' + ICONS.envelope + '</span>' +
              '<span>' + t('email') + '<small dir="ltr">' + esc(emailAddr) + '</small></span>' +
            '</a>' +
            '<a class="contact-btn" href="' + (/^https?:\/\//.test(siteUrl) ? siteUrl : 'https://' + siteUrl) + '" target="_blank">' +
              '<span class="ci" style="background:#E8EEFB">' + ICONS.globe + '</span>' +
              '<span>' + t('website') + '<small dir="ltr">' + esc(siteUrl) + '</small></span>' +
            '</a>' +
            (f.facebook || f.instagram || f.linkedin
              ? '<div class="chip-row" style="margin-top:8px">' +
                  (f.facebook ? '<a class="chip" href="' + esc(f.facebook) + '" target="_blank">Facebook</a>' : '') +
                  (f.instagram ? '<a class="chip" href="' + esc(f.instagram) + '" target="_blank">Instagram</a>' : '') +
                  (f.linkedin ? '<a class="chip" href="' + esc(f.linkedin) + '" target="_blank">LinkedIn</a>' : '') +
                '</div>'
              : '')
            )) +
          '</div>' +
          (signedIn() && (!window.Chat || String(Chat.myId()) !== String(f.ownerId)) ? '<div style="text-align:center;margin-top:10px">' + reportBtnHTML('factory', f.id, L(f.name)) + '</div>' : '') +
        '</aside>') +
      '</div>' +
    '</div>' +
  '</main>' +
  footerHTML();
  if (!locked && window.loadViews) loadViews('factory', f.id, 'facViews');
  if (!locked) {
    loadFactoryReviews(f.id, f.ownerId, L(f.name));
    if (f.ownerId) loadResponseStats(f.ownerId);
    loadFavorites(function () {
      var b = document.querySelector('.fav-btn[data-fid="' + f.id + '"]');
      if (b) { var on = isFav(f.id); b.classList.toggle('on', on); b.innerHTML = on ? ICONS.heartFilled : ICONS.heart; }
    });
  }
  });
});
</script>
