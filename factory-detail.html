<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script>(function(){try{var l=localStorage.getItem('sonnaLang');if(l==='en'){document.documentElement.lang='en';document.documentElement.dir='ltr';}else if(l==='ar'){document.documentElement.lang='ar';document.documentElement.dir='rtl';}}catch(e){}})();</script>
<title>ملف المصنع | صُنّاع</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Alexandria:wght@400;500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=Cairo:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

<div id="app"></div>

<script src="assets/js/icons.js"></script>
<script src="assets/js/lang.js"></script>
<script src="assets/js/data.js"></script>
<script src="assets/js/supabase-config.js"></script>
<script src="assets/js/store.js"></script>
<script src="assets/js/utils.js"></script>
<script src="assets/js/auth.js"></script>
<script src="assets/js/components.js"></script>
<script>
document.addEventListener('DOMContentLoaded', function() {
  AdminStore.bootstrap().then(function() {
  var savedLang = localStorage.getItem('sonnaLang');
  if (savedLang === 'en' || savedLang === 'ar') {
    LANG = savedLang;
  }
  document.documentElement.lang = LANG;
  document.documentElement.dir = LANG === 'ar' ? 'rtl' : 'ltr';

  // Members-only: require login to view factory pages
  if (!window.Auth || !Auth.isLoggedIn()) {
    document.getElementById('app').innerHTML = headerHTML() + mobileMenuHTML() + '<main>' + Auth.gateHTML() + '</main>' + footerHTML();
    return;
  }

  var params = new URLSearchParams(window.location.search);
  var factoryId = params.get('id');
  
  if (!factoryId) {
    window.location.href = 'factories.html';
    return;
  }
  
  var f = FACTORIES.find(function(x) { return x.id === factoryId; });
  if (!f) {
    window.location.href = 'factories.html';
    return;
  }
  
  var id = ind(f.industry);
  var slug = f.name.en.toLowerCase().replace(/[^a-z]+/g, '');
  // Unverified user submissions show name + sector only; all other panels are
  // locked until an admin verifies the factory.
  var locked = (f.verified === false);
  function lockedPanel(title) {
    return '<div class="panel locked-panel"><h2>' + title + '</h2>' +
      '<div class="lock-note">' + ICONS.clock + ' ' + t('mf_locked_note') + '</div></div>';
  }
  function lockedLayout() {
    return '<div>' +
      lockedPanel(t('about')) + lockedPanel(t('services_title')) + lockedPanel(t('products')) +
      lockedPanel(t('capabilities')) + lockedPanel(t('gallery')) + lockedPanel(t('details')) +
    '</div>' +
    '<aside class="contact-panel">' + lockedPanel(t('contact_title')) + '</aside>';
  }

  function stars(rating) {
    var s = '';
    for (var i = 0; i < 5; i++) s += i < Math.round(rating) ? ICONS.star : ICONS.starOutline;
    return s;
  }
  
  // Per-factory lists (fall back to the sector's defaults if a factory has none)
  function nonEmpty(o){ return o && ((o.en && o.en.length) || (o.ar && o.ar.length)); }
  var svcNames;
  if (Array.isArray(f.services)) {
    var sset = IND_SERVICES[f.industry] || {en:[],ar:[]};
    svcNames = f.services.map(function(s){
      if (LANG === 'ar') { for (var j=0;j<(sset.en||[]).length;j++){ if (sset.en[j].name === s.name) return (sset.ar[j]||sset.en[j]).name; } }
      return s.name;
    });
  } else { svcNames = L(f.services || {en:[],ar:[]}); }
  var prodList = nonEmpty(f.products) ? f.products : (IND_PRODUCTS[f.industry] || {en:[],ar:[]});
  var capList  = nonEmpty(f.capabilities) ? f.capabilities : (IND_CAPS[f.industry] || {en:[],ar:[]});
  var hoursTxt = (f.hours && (f.hours.en || f.hours.ar)) ? L(f.hours) : t('hours_val');
  var waNum = (f.whatsapp || f.phone || '').replace(/[^0-9]/g,'');
  var emailAddr = f.email || ('info@' + slug + '.example');
  var siteUrl = f.website || (slug + '.example.com');
  
  var app = document.getElementById('app');
  app.innerHTML = headerHTML() + mobileMenuHTML() + '<main>' +
    '<div class="container">' +
      '<a href="factories.html" class="back-btn">' + (LANG === 'ar' ? '→' : '←') + ' ' + t('back') + '</a>' +
    '</div>' +
    '<div class="container" style="margin-top:14px">' +
      '<div class="profile-cover" style="' + (f.cover ? 'background:#0000;background-image:url(\'' + f.cover + '\');background-size:cover;background-position:center' : 'background:' + grad(id.g)) + ';border-radius:20px">' +
        (locked ? '' : '<span class="pcode">' + factoryCode(f) + '</span>') +
        (f.cover ? '' : '<span class="cover-ic">' + id.icon + '</span>') +
      '</div>' +
      '<div class="profile-top">' +
        '<div class="profile-card">' +
          (f.logo
            ? '<div class="profile-logo" style="background-image:url(\'' + f.logo + '\');background-size:cover;background-position:center"></div>'
            : '<div class="profile-logo">' + L(f.name).charAt(0) + '</div>') +
          '<div class="profile-main">' +
            '<h1>' + esc(L(f.name)) + '</h1>' +
            '<div class="meta" style="color:var(--ink-soft);font-size:13.5px">' +
              id.icon + ' ' + L({en: id.en, ar: id.ar}) + (locked ? '' : ' · ' + ICONS.pin + ' ' + L(f.gov) + ' · ' + t('est') + ' ' + num(f.yr)) +
            '</div>' +
            (locked
              ? '<div class="badge-row">' + verifyBadge(f) + '</div>'
              : '<div class="rating-stars" style="margin-top:8px">' +
                  stars(f.rating) + ' <span class="rating-value">' + f.rating + '</span> <span class="rating-count">(' + num(f.reviewCount) + ' ' + t('rating_reviews') + ')</span>' +
                '</div>' +
                '<div class="badge-row">' +
                  verifyBadge(f) +
                  '<span class="chip teal">' + t('moq') + ': ' + num(f.moq) + ' ' + t('units') + '</span>' +
                  (f.exp ? '<span class="chip amber">' + ICONS.globe + ' ' + t('exports') + '</span>' : '') +
                  f.certs.map(function(c) { return '<span class="chip">' + ICONS.check + ' ' + c + '</span>'; }).join('') +
                  '<span class="capacity-badge daily">' + ICONS.chartBar + ' ' + t('daily_capacity') + ': ' + num(f.dailyCapacity) + '</span>' +
                  '<span class="capacity-badge monthly">' + ICONS.chartLine + ' ' + t('monthly_capacity') + ': ' + num(f.monthlyCapacity) + '</span>' +
                '</div>') +
          '</div>' +
        '</div>' +
      '</div>' +
      
      '<div class="profile-layout">' +
        (locked ? lockedLayout() :
        '<div>' +
          '<div class="panel">' +
            '<h2>' + t('about') + '</h2>' +
            '<p>' + esc(L(f.desc)) + '</p>' +
          '</div>' +
          '<div class="panel">' +
            '<h2>' + t('services_title') + '</h2>' +
            (svcNames.length > 0
              ? '<div class="services-grid">' + svcNames.map(function(name) { return '<div class="service-card"><span class="svc-icon">' + ICONS.wrench + '</span><span>' + esc(name) + '</span></div>'; }).join('') + '</div>'
              : '<p>' + t('no_services') + '</p>') +
          '</div>' +
          '<div class="panel">' +
            '<h2>' + t('products') + '</h2>' +
            '<div class="chip-row">' + L(prodList).map(function(p) { return '<span class="chip" style="font-size:13px;padding:7px 14px">' + esc(p) + '</span>'; }).join('') + '</div>' +
          '</div>' +
          '<div class="panel">' +
            '<h2>' + t('capabilities') + '</h2>' +
            '<div class="chip-row">' + L(capList).map(function(p) { return '<span class="chip teal" style="font-size:13px;padding:7px 14px">' + esc(p) + '</span>'; }).join('') + '</div>' +
          '</div>' +
          '<div class="panel">' +
            '<h2>' + t('gallery') + '</h2>' +
            '<div class="gallery">' +
              ((f.media && f.media.length)
                ? f.media.map(function(m) {
                    return m.type === 'video'
                      ? '<div class="ph"><video src="' + m.url + '" controls playsinline style="width:100%;height:100%;object-fit:cover"></video></div>'
                      : '<a class="ph" href="' + m.url + '" target="_blank" style="background-image:url(\'' + m.url + '\');background-size:cover;background-position:center"></a>';
                  }).join('')
                : [0,1,2,3,4,5].map(function(n) { return '<div class="ph" style="background:' + grad(id.g) + ';opacity:' + (1 - n * 0.09) + '">' + (n < 3 ? ICONS.camera : id.icon) + '</div>'; }).join('')) +
            '</div>' +
          '</div>' +
          '<div class="panel">' +
            '<h2>' + t('details') + '</h2>' +
            '<div class="spec-grid">' +
              '<div class="spec"><div class="k">' + t('established') + '</div><div class="v">' + num(f.yr) + '</div></div>' +
              '<div class="spec"><div class="k">' + t('employees') + '</div><div class="v">' + f.emp + '</div></div>' +
              '<div class="spec"><div class="k">' + t('location') + '</div><div class="v">' + ICONS.pin + ' ' + L(f.gov) + '</div></div>' +
              '<div class="spec"><div class="k">' + t('hours') + '</div><div class="v">' + esc(hoursTxt) + '</div></div>' +
              '<div class="spec"><div class="k">' + t('moq') + '</div><div class="v">' + num(f.moq) + ' ' + t('units') + '</div></div>' +
              '<div class="spec"><div class="k">' + t('certifications') + '</div><div class="v">' + (f.certs.length ? f.certs.join(' · ') : '—') + '</div></div>' +
            '</div>' +
          '</div>' +
        '</div>' +
        
        '<aside class="contact-panel">' +
          '<div class="panel">' +
            '<h2>' + t('contact_title') + '</h2>' +
            '<p style="margin-bottom:14px;font-size:13px">' + t('contact_sub') + '</p>' +
            '<a class="contact-btn" href="tel:' + f.phone.replace(/\s/g, '') + '">' +
              '<span class="ci" style="background:var(--teal-tint)">' + ICONS.phone + '</span>' +
              '<span>' + t('call') + '<small dir="ltr">' + f.phone + '</small></span>' +
            '</a>' +
            '<a class="contact-btn" href="' + (waNum ? 'https://wa.me/' + waNum : '#') + '"' + (waNum ? ' target="_blank"' : ' onclick="return false"') + '>' +
              '<span class="ci" style="background:#E7F6EC">' + ICONS.chat + '</span>' +
              '<span>' + t('whatsapp') + '<small dir="ltr">' + esc(f.whatsapp || f.phone) + '</small></span>' +
            '</a>' +
            '<a class="contact-btn" href="mailto:' + esc(emailAddr) + '">' +
              '<span class="ci" style="background:#FDF0E0">' + ICONS.envelope + '</span>' +
              '<span>' + t('email') + '<small dir="ltr">' + esc(emailAddr) + '</small></span>' +
            '</a>' +
            '<a class="contact-btn" href="' + (/^https?:\/\//.test(siteUrl) ? siteUrl : 'https://' + siteUrl) + '" target="_blank">' +
              '<span class="ci" style="background:#E8EEFB">' + ICONS.globe + '</span>' +
              '<span>' + t('website') + '<small dir="ltr">' + esc(siteUrl) + '</small></span>' +
            '</a>' +
            (f.facebook || f.instagram || f.linkedin
              ? '<div class="chip-row" style="margin-top:8px">' +
                  (f.facebook ? '<a class="chip" href="' + esc(f.facebook) + '" target="_blank">Facebook</a>' : '') +
                  (f.instagram ? '<a class="chip" href="' + esc(f.instagram) + '" target="_blank">Instagram</a>' : '') +
                  (f.linkedin ? '<a class="chip" href="' + esc(f.linkedin) + '" target="_blank">LinkedIn</a>' : '') +
                '</div>'
              : '') +
          '</div>' +
        '</aside>') +
      '</div>' +
    '</div>' +
  '</main>' +
  '<div class="container" style="padding:0 24px 28px"><p style="font-size:12px;color:var(--ink-soft);text-align:center">' + t('demo_note') + '</p></div>' +
  footerHTML();
  });
});
</script>
</body>
</html>
