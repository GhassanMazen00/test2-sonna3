<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script>(function(){try{var l=localStorage.getItem('sonnaLang');if(l==='en'){document.documentElement.lang='en';document.documentElement.dir='ltr';}else if(l==='ar'){document.documentElement.lang='ar';document.documentElement.dir='rtl';}var th=localStorage.getItem('sonnaTheme');if(!th){th=(window.matchMedia&&matchMedia('(prefers-color-scheme: dark)').matches)?'dark':'light';}document.documentElement.setAttribute('data-theme',th);}catch(e){}})();</script>
<title>لوحة المصنع | صُنّاع</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Alexandria:wght@400;500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=Cairo:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="icon" type="image/png" href="assets/favicon.png">
<link rel="apple-touch-icon" href="assets/favicon.png">
<link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

<div id="app"></div>

<script src="assets/js/icons.js"></script>
<script src="assets/js/lang.js"></script>
<script src="assets/js/data.js"></script>
<script src="assets/js/supabase-config.js"></script>
<script src="assets/js/store.js"></script>
<script src="assets/js/utils.js"></script>
<script src="assets/js/auth.js"></script>
<script src="assets/js/components.js"></script>
<script src="assets/js/chat.js"></script>
<script>
function shell(body) { document.getElementById('app').innerHTML = headerHTML() + mobileMenuHTML() + '<main>' + body + '</main>' + footerHTML(); }

function statTile(icon, value, label, accent) {
  return '<div class="stat-tile' + (accent ? ' accent' : '') + '">' +
    '<span class="stat-ic">' + icon + '</span>' +
    '<span class="stat-num">' + value + '</span>' +
    '<span class="stat-lbl">' + esc(label) + '</span>' +
  '</div>';
}

function relTime(iso) {
  var s = Math.max(0, Math.floor((Date.now() - new Date(iso).getTime()) / 86400000));
  return STR[LANG].days_ago(s);
}
function starsMini(rating) { var s = ''; for (var i = 0; i < 5; i++) s += i < Math.round(rating) ? ICONS.star : ICONS.starOutline; return s; }

// Incoming RFQ card with a respond action (factory owner).
function rfqOwnerCard(rfq) {
  return '<div class="rfq-item">' +
    '<div class="rfq-top"><b>' + esc(rfq.title || '') + '</b>' +
      '<span class="rfq-status s-' + esc(rfq.status) + '">' + t('rfq_status_' + rfq.status) + '</span></div>' +
    '<div class="muted" style="font-size:12.5px">' + t('by') + ' ' + esc(rfq.buyer_name || 'User') + ' · ' + t('qty') + ': ' + esc(rfq.qty || '—') +
      (rfq.target_price ? ' · ' + t('rfq_target') + ': ' + esc(rfq.target_price) : '') +
      (rfq.needed_by ? ' · ' + t('rfq_needed') + ': ' + esc(rfq.needed_by) : '') + '</div>' +
    (rfq.details ? '<p style="font-size:13.5px;margin:6px 0">' + esc(rfq.details) + '</p>' : '') +
    (rfq.status !== 'closed'
      ? (window.FAC_VERIFIED
          ? '<button class="btn btn-primary btn-sm" onclick="openQuoteModal(\'' + esc(rfq.id) + '\')">' + t('rfq_respond') + '</button>'
          : '<a class="btn btn-ghost btn-sm" href="my-factory.html">' + ICONS.shieldCheck + ' ' + t('rfq_verify_to_respond') + '</a>')
      : '') +
  '</div>';
}

function openQuoteModal(rfqId) {
  if (!window.FAC_VERIFIED) {
    alert(t('rfq_verify_to_respond') + '\n' + t('rfq_verify_note'));
    return;
  }
  var cap = (window.PLAN_LIMITS && PLAN_LIMITS.rfqPerMonth) || 15;
  if ((window.RFQ_USED || 0) >= cap) {
    alert(t('limit_rfq_title') + '\n' + t('limit_rfq_msg').replace('{n}', cap));
    return;
  }
  var bd = document.createElement('div');
  bd.className = 'modal-backdrop';
  bd.addEventListener('click', function (e) { if (e.target === bd) bd.remove(); });
  bd.innerHTML =
    '<div class="modal">' +
      '<h2>' + t('quote_title') + '</h2>' +
      '<p class="sub">' + t('quote_sub') + '</p>' +
      '<div class="au-err" id="qErr" style="display:none"></div>' +
      '<div class="form-grid">' +
        '<div class="form-field"><label>' + t('quote_price') + '</label><input id="q_price" type="text" placeholder="' + t('quote_price_ph') + '"></div>' +
        '<div class="form-field"><label>' + t('quote_lead') + '</label><input id="q_lead" type="text" placeholder="' + t('quote_lead_ph') + '"></div>' +
        '<div class="form-field full"><label>' + t('quote_notes') + '</label><textarea id="q_notes" rows="3"></textarea></div>' +
        '<div class="form-field full"><label>' + t('quote_file') + ' <span class="opt">(' + t('optional') + ')</span></label>' +
          '<input id="q_file" type="file" accept=".csv,.pdf,application/pdf,text/csv">' +
          '<div class="muted" style="font-size:12px;margin-top:4px">' + t('quote_file_note') + '</div></div>' +
      '</div>' +
      '<div class="modal-actions">' +
        '<button class="btn btn-ghost" onclick="this.closest(\'.modal-backdrop\').remove()">' + t('cancel') + '</button>' +
        '<button class="btn btn-primary" id="qSubmit">' + t('quote_send') + '</button>' +
      '</div>' +
    '</div>';
  document.body.appendChild(bd);
  bd.querySelector('#qSubmit').onclick = function () {
    var v = function (id) { var e = bd.querySelector('#' + id); return e ? e.value.trim() : ''; };
    var price = v('q_price'), notes = v('q_notes');
    var fileInput = bd.querySelector('#q_file');
    var file = fileInput && fileInput.files && fileInput.files[0];
    var err = bd.querySelector('#qErr');
    // Require at least a price, notes, or an attached file.
    if (!price && !notes && !file) { err.textContent = t('quote_need_something'); err.style.display = 'block'; return; }
    var btn = bd.querySelector('#qSubmit'); btn.disabled = true; btn.textContent = '…';
    var up = file ? Auth.uploadQuoteFile(file).then(function (url) { return { file_url: url, file_name: file.name }; }) : Promise.resolve({});
    up.then(function (fileFields) {
      return Auth.sendQuote(rfqId, Object.assign({ price: price || null, lead_time: v('q_lead') || null, notes: notes || '' }, fileFields));
    }).then(function () {
      bd.remove(); toast(t('quote_sent')); renderDashboard();
    }).catch(function (e2) {
      btn.disabled = false; btn.textContent = t('quote_send'); err.textContent = (e2.message || e2); err.style.display = 'block';
    });
  };
}

function renderDashboard() {
  if (!window.Auth || !Auth.isLoggedIn()) { shell(Auth.gateHTML()); return; }
  shell('<div class="container" style="padding:50px 24px">' + loadingHTML(t('dash_loading')) + '</div>');

  Auth.myFactory().then(function (fac) {
    if (!fac) {
      shell('<div class="container" style="padding:64px 24px;text-align:center;max-width:520px">' +
        '<p class="muted">' + t('mf_no_factory') + '</p>' +
        '<a class="btn btn-primary" style="margin-top:16px" href="account.html">' + t('fac_create') + '</a></div>');
      return;
    }
    var i = ind(fac.sector);
    var me = Auth.user().id;

    Promise.all([
      AdminStore.fetchViewCount('factory', fac.id),
      AdminStore.fetchResponseStats(me),
      AdminStore.fetchReviews(fac.id),
      Auth.token().then(function (tok) { return AdminStore.fetchSaveCount(fac.id, tok); }).catch(function () { return 0; }),
      Auth.incomingRFQs(),
      AdminStore.fetchRequests(),
      Auth.quotesThisMonth()
    ]).then(function (res) {
      var views = res[0] || 0;
      var stats = res[1] || {};
      var reviews = res[2] || [];
      var saves = res[3] || 0;
      var rfqs = res[4] || [];
      window.RFQ_USED = res[6] || 0;   // quotes sent this month (for the monthly cap)
      window.FAC_VERIFIED = !!fac.verified;   // only verified factories may reply to RFQs
      var matches = (res[5] || []).filter(function (r) {
        if (String(r.owner) === String(me)) return false;
        return (r.sector && r.sector === fac.sector) || (r.gov != null && String(r.gov) === String(fac.gov));
      }).slice(0, 6);
      var openRfqs = rfqs.filter(function (r) { return r.status === 'open'; }).length;
      var avgRating = reviews.length ? Math.round(reviews.reduce(function (s, r) { return s + r.rating; }, 0) / reviews.length * 10) / 10 : 0;

      var respLine = '';
      if (stats && stats.threads >= 3 && stats.rate != null) {
        var mins = stats.avg_minutes;
        var within = mins == null ? '' : (mins < 60 ? Math.max(1, Math.round(mins)) + ' ' + t('resp_min') : mins < 1440 ? Math.round(mins / 60) + ' ' + t('resp_hr') : Math.round(mins / 1440) + ' ' + t('resp_day'));
        respLine = '<div class="panel"><h2>' + t('dash_response') + '</h2>' +
          '<p>' + ICONS.chat + ' ' + t('resp_rate').replace('{rate}', stats.rate) + (within ? ' · ' + t('resp_within').replace('{time}', within) : '') + '</p></div>';
      }

      var recentReviews = reviews.slice(0, 3);

      var dashBody =
        '<div class="stat-grid">' +
          statTile(ICONS.eye, num(views), t('dash_views'), true) +
          statTile(ICONS.chat, num((stats && stats.threads) || 0), t('dash_convos')) +
          statTile(ICONS.star, reviews.length ? avgRating + ' <small>(' + num(reviews.length) + ')</small>' : t('new_badge'), t('reviews_title')) +
          statTile(ICONS.heart, num(saves), t('dash_saves')) +
          statTile(ICONS.clipboard, num(rfqs.length) + (openRfqs ? ' <small>(' + num(openRfqs) + ' ' + t('dash_open') + ')</small>' : ''), t('rfq_incoming')) +
        '</div>' +

        respLine +

        '<div class="panel"><h2>' + t('rfq_incoming') + (rfqs.length ? ' <span class="rating-count">(' + num(rfqs.length) + ')</span>' : '') + '</h2>' +
          (fac.verified
            ? '<div class="muted" style="font-size:12.5px;margin:-2px 0 10px">' + t('rfq_quota').replace('{used}', num(window.RFQ_USED)).replace('{n}', num(PLAN_LIMITS.rfqPerMonth)) + '</div>'
            : '') +
          (rfqs.length ? rfqs.map(rfqOwnerCard).join('') : '<p class="muted">' + t('rfq_none') + '</p>') +
        '</div>' +

        '<div class="dash-cols">' +
          '<div class="panel"><h2>' + t('dash_recent_reviews') + '</h2>' +
            (recentReviews.length
              ? recentReviews.map(function (r) { return '<div class="rfq-item"><div class="rfq-top"><b>' + esc(r.reviewer_name || 'User') + '</b><span class="review-stars">' + starsMini(r.rating) + '</span></div>' + (r.body ? '<p style="font-size:13.5px;margin:4px 0 0">' + esc(r.body) + '</p>' : '') + '</div>'; }).join('')
              : '<p class="muted">' + t('no_reviews_yet') + '</p>') +
          '</div>' +
          '<div class="panel"><h2>' + t('match_title') + '</h2>' +
            '<p class="muted" style="font-size:12.5px;margin-bottom:10px">' + t('match_sub') + '</p>' +
            (matches.length
              ? matches.map(function (r) { return '<a class="rfq-item" href="request-detail.html?id=' + encodeURIComponent(r.id) + '" style="display:block;text-decoration:none;color:inherit"><b>' + esc(r.title || '') + '</b><div class="muted" style="font-size:12.5px">' + t('qty') + ': ' + esc(r.qty || '—') + (GOVS[r.gov] ? ' · ' + esc(L(GOVS[r.gov])) : '') + '</div></a>'; }).join('')
              : '<p class="muted">' + t('match_none') + '</p>') +
          '</div>' +
        '</div>';

      // Unverified factories see the dashboard grayed out, behind a get-verified card.
      var lockCard =
        '<div class="dash-lock-card">' +
          '<span class="dash-lock-ic">' + ICONS.shieldCheck + '</span>' +
          '<h2>' + t('dash_locked_title') + '</h2>' +
          '<p>' + t('dash_locked_msg') + '</p>' +
          '<a class="btn btn-primary" href="my-factory.html">' + t('dash_verify_cta') + '</a>' +
        '</div>';

      shell(
        '<div class="container" style="padding:24px 24px 64px;max-width:960px">' +
          '<div style="display:flex;justify-content:space-between;align-items:center;gap:14px;flex-wrap:wrap;margin-bottom:6px">' +
            '<h1 style="font-size:24px;font-weight:800">' + i.icon + ' ' + esc(fac.name) + '</h1>' +
            '<div style="display:flex;gap:8px;flex-wrap:wrap">' +
              (fac.verified ? '<a class="btn btn-primary btn-sm" href="edit-factory.html">' + ICONS.wrench + ' ' + t('ef_edit') + '</a>' : '') +
              (fac.verified ? '<a class="btn btn-ghost btn-sm" href="factory-detail.html?id=' + encodeURIComponent(fac.id) + '">' + t('mf_view_public') + '</a>' : '') +
              '<a class="btn btn-ghost btn-sm" href="my-factory.html">' + t('dash_manage') + '</a>' +
            '</div>' +
          '</div>' +
          '<p class="muted" style="margin-bottom:18px">' + t('dash_intro') + '</p>' +
          (fac.verified
            ? dashBody
            : lockCard + '<div class="dash-locked" aria-hidden="true">' + dashBody + '</div>') +
        '</div>'
      );
    });
  }).catch(function (e) {
    shell('<div class="container" style="padding:64px 24px;text-align:center"><p class="muted">' + esc(e.message || e) + '</p></div>');
  });
}

document.addEventListener('DOMContentLoaded', function () {
  var savedLang = localStorage.getItem('sonnaLang');
  if (savedLang === 'en' || savedLang === 'ar') LANG = savedLang;
  document.documentElement.lang = LANG;
  document.documentElement.dir = LANG === 'ar' ? 'rtl' : 'ltr';
  if (!window.Auth || !Auth.isLoggedIn()) { renderDashboard(); return; }
  AdminStore.bootstrap().then(renderDashboard).catch(renderDashboard);
});
</script>
</body>
</html>
