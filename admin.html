<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Admin · Sonnaع</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/style.css">
<style>
  body::before { display: none; }
  body { background: #F4F7F6; }
  .admin-wrap { max-width: 1200px; margin: 0 auto; padding: 20px; }
  .admin-top { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 18px; flex-wrap: wrap; }
  .admin-top h1 { font-size: 22px; font-weight: 800; }
  .admin-top .brand-ain { color: var(--teal); }
  .admin-actions { display: flex; gap: 8px; flex-wrap: wrap; }
  .tabs { display: flex; gap: 6px; border-bottom: 2px solid var(--line); margin-bottom: 20px; flex-wrap: wrap; }
  .tab { padding: 10px 16px; border: none; background: none; font-weight: 700; font-size: 14px; color: var(--ink-soft); cursor: pointer; border-bottom: 3px solid transparent; margin-bottom: -2px; }
  .tab.active { color: var(--teal); border-bottom-color: var(--teal); }
  .panel-card { background: #fff; border: 1px solid var(--line); border-radius: 14px; padding: 20px; margin-bottom: 18px; box-shadow: var(--shadow); }
  .panel-card h2 { font-size: 17px; font-weight: 800; margin-bottom: 4px; }
  .panel-card .hint { font-size: 12.5px; color: var(--ink-soft); margin-bottom: 14px; }
  table.data { width: 100%; border-collapse: collapse; font-size: 13.5px; }
  table.data th, table.data td { text-align: left; padding: 10px 8px; border-bottom: 1px solid var(--line); vertical-align: middle; }
  table.data th { font-size: 11px; text-transform: uppercase; letter-spacing: .04em; color: var(--ink-soft); }
  table.data .ic-cell .svg-ic { width: 20px; height: 20px; color: var(--teal); }
  .row-actions { display: flex; gap: 6px; justify-content: flex-end; }
  .form-grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .fld { display: flex; flex-direction: column; gap: 5px; }
  .fld.full { grid-column: 1 / -1; }
  .fld label { font-size: 12.5px; font-weight: 600; color: var(--ink-soft); }
  .fld input[type=text], .fld input[type=number], .fld select, .fld textarea {
    width: 100%; padding: 9px 11px; border: 1.5px solid var(--line); border-radius: 9px;
    font-size: 13.5px; font-family: inherit; background: #fff;
  }
  .fld textarea { min-height: 70px; resize: vertical; }
  .check-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 6px; }
  .check-list label { display: flex; align-items: center; gap: 7px; font-size: 13px; font-weight: 500; color: var(--ink); }
  .chk-row { display: flex; align-items: center; gap: 8px; font-size: 14px; font-weight: 600; padding: 6px 0; }
  .pill-list { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 12px; }
  .pill { display: inline-flex; align-items: center; gap: 8px; background: var(--mist); border: 1px solid var(--line); border-radius: 99px; padding: 5px 6px 5px 12px; font-size: 13px; }
  .pill button { border: none; background: var(--line); color: var(--ink); width: 20px; height: 20px; border-radius: 50%; cursor: pointer; font-size: 13px; line-height: 1; }
  .inline-add { display: flex; gap: 8px; flex-wrap: wrap; align-items: end; }
  .inline-add .fld { flex: 1; min-width: 140px; }
  .icon-preview { display: inline-grid; place-items: center; width: 40px; height: 40px; border-radius: 10px; background: var(--teal-tint); color: var(--teal); }
  .icon-preview .svg-ic { width: 22px; height: 22px; }
  .muted { color: var(--ink-soft); font-size: 12.5px; }
  .danger { color: #B42318; }
  .btn-danger { background: #FEE4E2; color: #B42318; }
  .btn-danger:hover { background: #FBD5D2; }
  .overlay { position: fixed; inset: 0; background: rgba(21,34,31,.5); display: flex; align-items: flex-start; justify-content: center; padding: 24px; overflow: auto; z-index: 100; }
  .modal-box { background: #fff; border-radius: 16px; width: 100%; max-width: 720px; padding: 24px; box-shadow: 0 20px 60px rgba(0,0,0,.25); }
  .modal-box h2 { font-size: 18px; font-weight: 800; margin-bottom: 16px; }
  .modal-foot { display: flex; justify-content: flex-end; gap: 10px; margin-top: 18px; }
  .login-box { max-width: 380px; margin: 12vh auto 0; background: #fff; border: 1px solid var(--line); border-radius: 16px; padding: 28px; box-shadow: var(--shadow); text-align: center; }
  .login-box h1 { font-size: 22px; font-weight: 800; margin-bottom: 6px; }
  .login-box p { font-size: 13px; color: var(--ink-soft); margin-bottom: 18px; }
  .login-box input { width: 100%; padding: 12px; border: 1.5px solid var(--line); border-radius: 10px; font-size: 15px; margin-bottom: 12px; }
  .login-err { color: #B42318; font-size: 13px; margin-bottom: 10px; display: none; }
  .save-bar { position: sticky; bottom: 0; background: rgba(255,255,255,.95); backdrop-filter: blur(8px); border-top: 1px solid var(--line); padding: 12px 0; display: flex; justify-content: flex-end; gap: 10px; }
  .admin-search { width: 100%; padding: 10px 12px; border: 1.5px solid var(--line); border-radius: 10px; font-size: 14px; font-family: inherit; background: var(--mist); }
  .media-row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .media-grid { display: flex; flex-wrap: wrap; gap: 10px; }
  .media-thumb { width: 90px; height: 68px; border-radius: 8px; background: var(--mist); background-size: cover; background-position: center; border: 1px solid var(--line); object-fit: cover; }
  .media-item { position: relative; }
  .media-item .btn-danger { position: absolute; top: 3px; inset-inline-end: 3px; padding: 2px 7px; border-radius: 6px; }
  .section-sep { border-top: 1px solid var(--line); padding-top: 14px; margin-top: 4px; }
  .section-sep b { font-size: 14px; }
  @media (max-width: 640px) { .form-grid2 { grid-template-columns: 1fr; } }
</style>
</head>
<body>

<div id="root"></div>

<script src="assets/js/icons.js"></script>
<script src="assets/js/data.js"></script>
<script src="assets/js/supabase-config.js"></script>
<script src="assets/js/store.js"></script>
<script>
/* ================= Admin dashboard ================= */

// Login and data now use your Supabase backend: real, secure email/password
// login, and changes save straight to the live database. Connection values are
// in assets/js/supabase-config.js.
var DATA = null;
var TAB = 'factories';
var root = document.getElementById('root');
var SB_TOKEN = null;
var SEARCH = {};        // per-tab search text
var EDIT_FX = null;     // factory being edited (holds its media while the form is open)
var _FAC_EDIT = null;   // the factory object currently in the form
var _FAC_ONSAVE = null; // what to do when the factory form is saved
var SUBS = [];          // user-submitted factories (from the 'factories' table)
var SUBS_FILTER = 'all';

// Live-filter a table body without rebuilding the search box (keeps focus)
function onSearch(tab, v) {
  SEARCH[tab] = v;
  var body = document.getElementById(tab + 'Body');
  if (!body) return;
  if (tab === 'factories') body.innerHTML = factoryRows();
  else if (tab === 'sectors') body.innerHTML = sectorRows();
  else if (tab === 'requests') body.innerHTML = requestRows();
}
function searchBar(tab, placeholder) {
  return '<input class="admin-search" id="search_' + tab + '" placeholder="' + placeholder + '" value="' + esc(SEARCH[tab] || '') + '" oninput="onSearch(\'' + tab + '\', this.value)">';
}
function hit(text, tab) { var q = (SEARCH[tab] || '').trim().toLowerCase(); return !q || String(text).toLowerCase().indexOf(q) >= 0; }

function esc(s) { return String(s == null ? '' : s).replace(/[&<>"]/g, function(c){ return ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'})[c]; }); }
function iconKeys() { return Object.keys(window.ICONS || {}); }
function uid() {
  var max = -1;
  DATA.factories.forEach(function(f){ var n = parseInt(String(f.id).replace(/[^0-9]/g,''),10); if(!isNaN(n)&&n>max) max=n; });
  return 'f' + (max + 1);
}
function setSaveStatus(msg) { var el = document.getElementById('saveStatus'); if (el) el.textContent = msg; }
// Save to the live database (and cache locally). Optimistic: UI already updated.
// Return a valid access token, refreshing it first if it has (nearly) expired.
// This prevents the "exp claim timestamp check failed" errors on save/upload.
function getFreshToken() {
  var s = null;
  try { s = JSON.parse(sessionStorage.getItem('sbSession') || 'null'); } catch(e){}
  if (!s || !s.access_token) return Promise.reject(new Error('not logged in'));
  var now = Date.now() / 1000;
  if (s.expires_at && now < s.expires_at - 60) { SB_TOKEN = s.access_token; return Promise.resolve(s.access_token); }
  if (!s.refresh_token) return Promise.reject(new Error('session expired'));
  return fetch(SUPABASE_URL + '/auth/v1/token?grant_type=refresh_token', {
    method: 'POST', headers: { apikey: SUPABASE_ANON_KEY, 'Content-Type': 'application/json' },
    body: JSON.stringify({ refresh_token: s.refresh_token })
  }).then(function(r){ return r.json().then(function(j){ return { ok: r.ok, j: j }; }); })
    .then(function(res){
      if (res.ok && res.j.access_token) {
        var exp = res.j.expires_at || (Math.floor(Date.now()/1000) + (res.j.expires_in || 3600));
        try { sessionStorage.setItem('sbSession', JSON.stringify({ access_token: res.j.access_token, refresh_token: res.j.refresh_token || s.refresh_token, expires_at: exp, email: s.email })); } catch(e){}
        SB_TOKEN = res.j.access_token; return SB_TOKEN;
      }
      throw new Error('session expired');
    });
}
function saveData() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(DATA)); } catch(e){}
  setSaveStatus('Saving…');
  return getFreshToken().then(function(tok){ return AdminStore.saveRemote(DATA, tok); }).then(function(){
    setSaveStatus('Saved ✓');
    setTimeout(function(){ setSaveStatus(''); }, 2000);
  }).catch(function(err){
    setSaveStatus('');
    var m = String(err && err.message || '');
    if (m.indexOf('401') >= 0 || m.indexOf('403') >= 0) {
      alert('Your login has expired or is not authorized to edit. Please log out and log back in.');
    } else {
      alert('Could not save to the database (' + m + ').\nYour change is kept in this browser — check your connection and try again.');
    }
  });
}
function lines(arr) { return (arr || []).join('\n'); }
function toLines(str) { return String(str || '').split('\n').map(function(s){return s.trim();}).filter(Boolean); }

/* ---------- Auth (Supabase) ---------- */
function tokenValid() {
  try {
    var s = JSON.parse(sessionStorage.getItem('sbSession') || 'null');
    if (!s || !s.access_token) return false;
    if (s.expires_at && (Date.now()/1000) > (s.expires_at - 30)) return false;
    SB_TOKEN = s.access_token;
    return true;
  } catch(e){ return false; }
}
function renderLogin(errMsg) {
  root.innerHTML =
    '<div class="login-box">' +
      '<h1>Sonna<span style="color:var(--teal)">ع</span> Admin</h1>' +
      '<p>Log in to manage factories, sectors, and search settings.</p>' +
      '<div class="login-err" id="loginErr" style="'+(errMsg?'display:block':'')+'">'+esc(errMsg||'')+'</div>' +
      '<input type="email" id="email" placeholder="Email" autofocus>' +
      '<input type="password" id="pw" placeholder="Password">' +
      '<button class="btn btn-primary" style="width:100%" id="loginBtn" onclick="doLogin()">Log in</button>' +
    '</div>';
  document.getElementById('pw').addEventListener('keydown', function(e){ if(e.key==='Enter') doLogin(); });
}
function doLogin() {
  var email = (document.getElementById('email').value || '').trim();
  var pw = document.getElementById('pw').value || '';
  if (!email || !pw) { renderLogin('Enter your email and password.'); return; }
  document.getElementById('loginBtn').textContent = 'Logging in…';
  fetch(SUPABASE_URL + '/auth/v1/token?grant_type=password', {
    method: 'POST',
    headers: { apikey: SUPABASE_ANON_KEY, 'Content-Type': 'application/json' },
    body: JSON.stringify({ email: email, password: pw })
  }).then(function(r){ return r.json().then(function(j){ return { ok: r.ok, j: j }; }); })
    .then(function(res){
      if (res.ok && res.j.access_token) {
        var exp = res.j.expires_at || (Math.floor(Date.now()/1000) + (res.j.expires_in || 3600));
        try { sessionStorage.setItem('sbSession', JSON.stringify({ access_token: res.j.access_token, refresh_token: res.j.refresh_token, expires_at: exp, email: email })); } catch(e){}
        SB_TOKEN = res.j.access_token;
        boot();
      } else {
        renderLogin(res.j.error_description || res.j.msg || 'Wrong email or password.');
      }
    })
    .catch(function(){ renderLogin('Could not reach the login server. Check your connection.'); });
}
function logout() { try { sessionStorage.removeItem('sbSession'); } catch(e){} SB_TOKEN = null; renderLogin(); }

/* ---------- Shell ---------- */
function boot() {
  root.innerHTML = '<div style="padding:60px;text-align:center;color:var(--ink-soft)">Loading…</div>';
  AdminStore.fetchRemote().then(function(remote){
    DATA = (remote && (remote.factories || remote.industries)) ? remote : AdminStore.defaults();
    if (!DATA.requests) DATA.requests = AdminStore.defaults().requests;   // migrate older saves
    renderApp();
  }).catch(function(){
    DATA = AdminStore.defaults();
    renderApp();
  });
}
function renderApp() {
  var tabs = [['factories','Factories'],['submissions','Factory submissions'],['requests','Requests'],['sectors','Sectors'],['config','Search & Filters'],['data','Data & Backup']];
  root.innerHTML =
    '<div class="admin-wrap">' +
      '<div class="admin-top">' +
        '<h1>Sonna<span class="brand-ain">ع</span> — Control Panel</h1>' +
        '<div class="admin-actions">' +
          '<span id="saveStatus" class="muted" style="align-self:center"></span>' +
          '<a class="btn btn-ghost btn-sm" href="index.html" target="_blank">View site ↗</a>' +
          '<button class="btn btn-ghost btn-sm" onclick="logout()">Log out</button>' +
        '</div>' +
      '</div>' +
      '<div class="tabs">' +
        tabs.map(function(t){ return '<button class="tab'+(TAB===t[0]?' active':'')+'" onclick="switchTab(\''+t[0]+'\')">'+t[1]+'</button>'; }).join('') +
      '</div>' +
      '<div id="tabBody"></div>' +
    '</div>';
  renderTab();
}
function switchTab(t) { TAB = t; renderApp(); }
function renderTab() {
  if (TAB === 'factories') renderFactories();
  else if (TAB === 'submissions') renderSubmissions();
  else if (TAB === 'requests') renderRequests();
  else if (TAB === 'sectors') renderSectors();
  else if (TAB === 'config') renderConfig();
  else renderDataTab();
}

/* ---------- Factories ---------- */
function sectorName(id) { var s = DATA.industries.find(function(i){return i.id===id;}); return s ? s.en : id; }
function govName(ix) { var g = DATA.govs[ix]; return g ? g.en : '—'; }

// Verified user submissions live in the 'factories' table (SUBS), not in
// DATA.factories. Once verified they belong under "Factories" — list them here
// alongside the admin-managed ones, routing edit/delete to the table handlers.
function verifiedSubRows() {
  return SUBS.filter(function(row){ return row.verified; })
    .filter(function(row){ var i = DATA.industries.find(function(s){return s.id===row.sector;}); return hit(row.name+' '+(i?i.en:row.sector)+' '+((DATA.govs[row.gov]||{}).en||'')+' '+((row.data||{}).keywords||''), 'factories'); })
    .map(function(row){
      var i = DATA.industries.find(function(s){return s.id===row.sector;});
      var d = row.data || {};
      return '<tr>' +
        '<td><b>'+esc(row.name)+'</b> <span class="chip teal" style="font-size:10px;padding:2px 7px;vertical-align:middle">Submitted</span>'+deletionChip(row)+'</td>' +
        '<td>'+esc(i?i.en:row.sector)+'</td>' +
        '<td>'+esc((DATA.govs[row.gov]||{}).en||'—')+'</td>' +
        '<td>'+esc(d.moq||'—')+'</td>' +
        '<td></td>' +
        '<td><div class="row-actions">' +
          '<button class="btn btn-ghost btn-sm" onclick="editSubmittedFactory(\''+row.id+'\')">Edit</button>' +
          '<button class="btn btn-sm btn-danger" onclick="deleteSubmission(\''+row.id+'\')">Delete</button>' +
        '</div></td>' +
      '</tr>';
    }).join('');
}
function factoryRows() {
  var out = DATA.factories.map(function(f, i){ return { f:f, i:i }; })
    .filter(function(o){ var f=o.f; return hit(f.name.en+' '+f.name.ar+' '+sectorName(f.industry)+' '+govName(f.govIndex)+' '+(f.keywords||''), 'factories'); })
    .map(function(o){ var f=o.f, i=o.i;
      return '<tr>' +
        '<td><b>'+esc(f.name.en)+'</b><div class="muted" dir="rtl">'+esc(f.name.ar)+'</div></td>' +
        '<td>'+esc(sectorName(f.industry))+'</td>' +
        '<td>'+esc(govName(f.govIndex))+'</td>' +
        '<td>'+esc(f.moq)+'</td>' +
        '<td>'+(f.featured?'★':'')+'</td>' +
        '<td><div class="row-actions">' +
          '<button class="btn btn-ghost btn-sm" onclick="editFactory('+i+')">Edit</button>' +
          '<button class="btn btn-sm btn-danger" onclick="deleteFactory('+i+')">Delete</button>' +
        '</div></td>' +
      '</tr>';
    }).join('');
  var combined = out + verifiedSubRows();
  return combined || '<tr><td colspan="6" class="muted">No factories match.</td></tr>';
}
function factoryCount() { return DATA.factories.length + SUBS.filter(function(r){ return r.verified; }).length; }
function renderFactories() {
  document.getElementById('tabBody').innerHTML =
    '<div class="panel-card">' +
      '<div style="display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:12px;flex-wrap:wrap">' +
        '<div><h2 id="facCount">Factories ('+factoryCount()+')</h2><div class="hint" style="margin:0">Add, edit, or remove any factory. Verified user submissions appear here too. Changes save to the live site.</div></div>' +
        '<button class="btn btn-primary btn-sm" onclick="editFactory(-1)">+ Add factory</button>' +
      '</div>' +
      searchBar('factories', 'Search factories by name, sector, city, keywords…') +
      '<div style="overflow-x:auto;margin-top:12px"><table class="data"><thead><tr><th>Name</th><th>Sector</th><th>Governorate</th><th>MOQ</th><th>Featured</th><th></th></tr></thead><tbody id="factoriesBody">' +
        factoryRows() +
      '</tbody></table></div>' +
    '</div>';
  // Verified submissions live in the factories table — fetch and merge them in.
  AdminStore.fetchFactoryRows().then(function(rows){
    SUBS = rows || [];
    var body = document.getElementById('factoriesBody');
    if (body) body.innerHTML = factoryRows();
    var cnt = document.getElementById('facCount');
    if (cnt) cnt.textContent = 'Factories ('+factoryCount()+')';
  }).catch(function(){});
}

function nonEmptyList(o){ return o && ((o.en && o.en.length) || (o.ar && o.ar.length)); }
function sectorDef(id){ return DATA.industries.find(function(s){return s.id===id;}) || {products:{en:[],ar:[]},caps:{en:[],ar:[]},services:{en:[],ar:[]}}; }
function names(list){ return (list||[]).map(function(x){ return (x && x.name != null) ? x.name : x; }); }

function editFactory(i) {
  var f = i >= 0 ? DATA.factories[i] : {
    id: uid(), industry: (DATA.industries[0]||{}).id, govIndex: 0,
    name:{en:'',ar:''}, desc:{en:'',ar:''}, yr: 2010, moq: 500, emp: '50–100',
    phone: '+20 10', exp: false, featured: false, certs: [],
    dailyCapacity: 500, monthlyCapacity: 13000, rating: 4.5, reviewCount: 20,
    services: {en:[],ar:[]}, products: {en:[],ar:[]}, capabilities: {en:[],ar:[]},
    hours: {en:'',ar:''}, keywords: '', whatsapp:'', email:'', website:'', facebook:'', instagram:'', linkedin:''
  };
  factoryFormFor(f, (i < 0 ? 'Add' : 'Edit') + ' factory', function (obj) {
    if (i >= 0) DATA.factories[i] = obj; else DATA.factories.unshift(obj);
    saveData(); closeModal(); renderTab();
  });
}
function factoryFormFor(f, title, onSave) {
  EDIT_FX = { logo: f.logo || '', cover: f.cover || '', media: (f.media || []).slice() };
  _FAC_EDIT = f;
  _FAC_ONSAVE = onSave;
  var sd = sectorDef(f.industry);
  // Prefill from the sector's defaults if this factory has none yet
  var prod = nonEmptyList(f.products) ? f.products : { en: (sd.products||{}).en||[], ar: (sd.products||{}).ar||[] };
  var caps = nonEmptyList(f.capabilities) ? f.capabilities : { en: (sd.caps||{}).en||[], ar: (sd.caps||{}).ar||[] };
  var svc;
  if (f.services && !Array.isArray(f.services) && nonEmptyList(f.services)) svc = f.services;
  else if (Array.isArray(f.services) && f.services.length) { var nm = names(f.services); svc = { en: nm, ar: nm }; }
  else svc = { en: names((sd.services||{}).en), ar: names((sd.services||{}).ar) };
  var hrs = f.hours || {en:'',ar:''};
  var sectorOpts = DATA.industries.map(function(s){ return '<option value="'+esc(s.id)+'"'+(s.id===f.industry?' selected':'')+'>'+esc(s.en)+'</option>'; }).join('');
  var govOpts = DATA.govs.map(function(g,ix){ return '<option value="'+ix+'"'+(ix===f.govIndex?' selected':'')+'>'+esc(g.en)+'</option>'; }).join('');

  openModal(title,
    '<div class="form-grid2">' +
      fld('Name (English) *', '<input type="text" id="fx_nameEn" value="'+esc(f.name.en)+'">') +
      fld('Name (Arabic) *', '<input type="text" id="fx_nameAr" dir="rtl" value="'+esc(f.name.ar)+'">') +
      fld('Sector', '<select id="fx_industry">'+sectorOpts+'</select>') +
      fld('Governorate', '<select id="fx_gov">'+govOpts+'</select>') +
      fld('Year established', '<input type="number" id="fx_yr" value="'+esc(f.yr)+'">') +
      fld('MOQ (min. order)', '<input type="number" id="fx_moq" value="'+esc(f.moq)+'">') +
      fld('Employees', '<input type="text" id="fx_emp" value="'+esc(f.emp)+'" placeholder="e.g. 50–100">') +
      fld('Phone', '<input type="text" id="fx_phone" value="'+esc(f.phone)+'">') +
      fld('Daily capacity', '<input type="number" id="fx_daily" value="'+esc(f.dailyCapacity)+'">') +
      fld('Monthly capacity', '<input type="number" id="fx_monthly" value="'+esc(f.monthlyCapacity)+'">') +
      fld('Rating (0–5)', '<input type="number" step="0.1" min="0" max="5" id="fx_rating" value="'+esc(f.rating)+'">') +
      fld('Review count', '<input type="number" id="fx_reviews" value="'+esc(f.reviewCount)+'">') +

/* --- Factory media upload UI (uses EDIT_FX while the form is open) --- */
function fxImageBox(kind) {
  var url = EDIT_FX[kind];
  return (url
      ? '<div class="media-thumb" style="background-image:url(\''+url+'\')"></div>' +
        '<button type="button" class="btn btn-sm btn-danger" onclick="removeFactoryImage(\''+kind+'\')">Remove</button>'
      : '<span class="muted">No picture.</span>') +
    '<label class="btn btn-ghost btn-sm" style="cursor:pointer;margin-inline-start:8px">'+(url?'Replace':'Upload')+'<input type="file" accept="image/*" style="display:none" onchange="uploadFactoryImage(\''+kind+'\', this)"></label>' +
    '<span class="upl-status muted" style="margin-inline-start:8px"></span>';
}
function fxMediaListHtml() {
  if (!EDIT_FX.media.length) return '<span class="muted">No product media yet.</span>';
  return EDIT_FX.media.map(function(m, ix){
    var thumb = m.type === 'video'
      ? '<video src="'+m.url+'" muted class="media-thumb"></video>'
      : '<div class="media-thumb" style="background-image:url(\''+m.url+'\')"></div>';
    return '<div class="media-item">'+thumb+'<button type="button" class="btn btn-sm btn-danger" onclick="removeMedia('+ix+')">✕</button></div>';
  }).join('');
}
function requireLogin() {
  if (!SB_TOKEN) { alert('Please log in again to upload files.'); return false; }
  return true;
}
function uploadFactoryImage(kind, input) {
  var file = input.files[0]; if (!file || !requireLogin()) return;
  var box = document.getElementById(kind === 'logo' ? 'fxLogoBox' : 'fxCoverBox');
  var status = box.querySelector('.upl-status'); if (status) status.textContent = 'Uploading…';
  getFreshToken().then(function(tok){ return AdminStore.uploadFile(file, tok); }).then(function(url){
    if (EDIT_FX[kind]) AdminStore.deleteFile(EDIT_FX[kind], SB_TOKEN);
    EDIT_FX[kind] = url;
    box.innerHTML = fxImageBox(kind);
  }).catch(function(e){ if (status) status.textContent = ''; alert('Upload failed: ' + (e.message || e) + '\n\nIf it mentions the bucket, make sure a public Supabase Storage bucket named "media" exists. If it mentions the session, log out and back in.'); });
}
function removeFactoryImage(kind) {
  if (EDIT_FX[kind]) AdminStore.deleteFile(EDIT_FX[kind], SB_TOKEN);
  EDIT_FX[kind] = '';
  document.getElementById(kind === 'logo' ? 'fxLogoBox' : 'fxCoverBox').innerHTML = fxImageBox(kind);
}
function uploadFactoryMedia(input) {
  if (!requireLogin()) return;
  var files = Array.prototype.slice.call(input.files); if (!files.length) return;
  var status = document.getElementById('fxMediaStatus');
  var done = 0, total = files.length;
  status.textContent = 'Uploading 0/' + total + '…';
  files.forEach(function(file){
    getFreshToken().then(function(tok){ return AdminStore.uploadFile(file, tok); }).then(function(url){
      EDIT_FX.media.push({ type: file.type.indexOf('video') === 0 ? 'video' : 'image', url: url });
    }).catch(function(e){ alert('One file failed to upload: ' + (e.message || e)); })
      .then(function(){ done++; status.textContent = done < total ? ('Uploading ' + done + '/' + total + '…') : ''; document.getElementById('fxMediaList').innerHTML = fxMediaListHtml(); });
  });
  input.value = '';
}
function removeMedia(ix) {
  var m = EDIT_FX.media[ix];
  if (m && m.url) AdminStore.deleteFile(m.url, SB_TOKEN);
  EDIT_FX.media.splice(ix, 1);
  document.getElementById('fxMediaList').innerHTML = fxMediaListHtml();
}

/* ---------- Factory submissions (user-created, in the 'factories' table) ---------- */
function adminPatchFactory(id, body) {
  return getFreshToken().then(function(tok){
    return fetch(SUPABASE_URL + '/rest/v1/factories?id=eq.' + id, {
      method:'PATCH', headers:{ apikey:SUPABASE_ANON_KEY, Authorization:'Bearer '+tok, 'Content-Type':'application/json', Prefer:'return=minimal' },
      body: JSON.stringify(body)
    }).then(function(r){ if(!r.ok) return r.text().then(function(t){ throw new Error(t||r.status); }); return true; });
  });
}
function adminDeleteFactory(id) {
  return getFreshToken().then(function(tok){
    return fetch(SUPABASE_URL + '/rest/v1/factories?id=eq.' + id, {
      method:'DELETE', headers:{ apikey:SUPABASE_ANON_KEY, Authorization:'Bearer '+tok }
    }).then(function(r){ if(!r.ok) throw new Error('delete '+r.status); return true; });
  });
}
function rowToAdminFactory(row) {
  var d = row.data || {};
  return {
    id: row.id, industry: row.sector, govIndex: row.gov,
    name: d.name || { en: row.name, ar: row.name },
    desc: d.desc || {en:'',ar:''}, yr: d.yr||0, moq: d.moq||0, emp: d.emp||'', phone: d.phone||'',
    exp: !!d.exp, featured: !!d.featured, certs: d.certs||[],
    dailyCapacity: d.dailyCapacity||0, monthlyCapacity: d.monthlyCapacity||0,
    rating: d.rating||0, reviewCount: d.reviewCount||0,
    products: d.products||{en:[],ar:[]}, capabilities: d.capabilities||{en:[],ar:[]}, services: d.services||{en:[],ar:[]},
    hours: d.hours||{en:'',ar:''}, keywords: d.keywords||'',
    whatsapp: d.whatsapp||'', email: d.email||'', website: d.website||'',
    facebook: d.facebook||'', instagram: d.instagram||'', linkedin: d.linkedin||'',
    logo: d.logo||'', cover: d.cover||'', media: d.media||[]
  };
}
function subStatusChip(row) {

        '<div><h2>Factory submissions</h2><div class="hint" style="margin:0">Factories created by users. Verify, edit full details, or delete. New ones show their creation date; verification requests show the form the user filled.</div></div>' +
        '<select onchange="SUBS_FILTER=this.value;renderSubmissions()" style="padding:8px 10px;border:1.5px solid var(--line);border-radius:9px">' +

function verifyRow(id) {
  if (!confirm('Mark this factory as verified? It will show a verified badge in the directory.')) return;
  adminPatchFactory(id, { verified: true, verification_requested: false }).then(function(){ renderSubmissions(); })
    .catch(function(e){ alert('Could not verify: '+(e.message||e)); });

function deleteSubmission(id) {
  var r = findSub(id);
  if (!confirm('Delete "'+(r?r.name:'this factory')+'"? This removes it from the site.')) return;

function editSubmittedFactory(id) {
  var row = findSub(id); if (!row) return;
  factoryFormFor(rowToAdminFactory(row), 'Edit submitted factory', function(obj){
    adminPatchFactory(id, { name: obj.name.en, sector: obj.industry, gov: obj.govIndex, data: obj }).then(function(){
      closeModal(); renderTab();
    }).catch(function(e){ alert('Could not save: '+(e.message||e)); });

        '<td><div class="row-actions">' +
          '<button class="btn btn-ghost btn-sm" onclick="editSector('+i+')">Edit</button>' +
          '<button class="btn btn-sm btn-danger" onclick="deleteSector('+i+')">Delete</button>' +
        '</div></td>' +
      '</tr>';
    }).join('');
  return out || '<tr><td colspan="5" class="muted">No sectors match.</td></tr>';
}
function renderSectors() {
  document.getElementById('tabBody').innerHTML =
    '<div class="panel-card">' +
      '<div style="display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:12px;flex-wrap:wrap">' +
        '<div><h2>Sectors ('+DATA.industries.length+')</h2><div class="hint" style="margin:0">These are the industries factories belong to and that appear in the sector filter.</div></div>' +
        '<button class="btn btn-primary btn-sm" onclick="editSector(-1)">+ Add sector</button>' +
      '</div>' +
      searchBar('sectors', 'Search sectors by name or id…') +
      '<div style="overflow-x:auto;margin-top:12px"><table class="data"><thead><tr><th>Icon</th><th>Name</th><th>ID</th><th>Factories</th><th></th></tr></thead><tbody id="sectorsBody">' +
        sectorRows() +
      '</tbody></table></div>' +
    '</div>';
}

function editSector(i) {
  var isNew = i < 0;
  var s = !isNew ? DATA.industries[i] : { id:'', en:'', ar:'', iconKey:'factory', c1:'#0E6B5E', c2:'#12897A', code:'', products:{en:[],ar:[]}, caps:{en:[],ar:[]}, services:{en:[],ar:[]} };
  var iconOpts = iconKeys().map(function(k){ return '<option value="'+k+'"'+(k===s.iconKey?' selected':'')+'>'+k+'</option>'; }).join('');
  openModal((isNew?'Add':'Edit')+' sector',
    '<div class="form-grid2">' +
      fld('ID (lowercase, no spaces) *', '<input type="text" id="sc_id" value="'+esc(s.id)+'"'+(isNew?'':' readonly style="background:#f0f2f1"')+' placeholder="e.g. jewelry">') +
      fld('Code (short, e.g. TXT)', '<input type="text" id="sc_code" value="'+esc(s.code)+'">') +
      fld('Name (English) *', '<input type="text" id="sc_en" value="'+esc(s.en)+'">') +
      fld('Name (Arabic) *', '<input type="text" id="sc_ar" dir="rtl" value="'+esc(s.ar)+'">') +
      '<div class="fld"><label>Icon</label><div style="display:flex;gap:10px;align-items:center"><span class="icon-preview" id="sc_iconPrev">'+(window.ICONS[s.iconKey]||'')+'</span><select id="sc_icon" onchange="document.getElementById(\'sc_iconPrev\').innerHTML=window.ICONS[this.value]||\'\'">'+iconOpts+'</select></div></div>' +
      '<div class="fld"><label>Colors (used for the sector\'s gradient)</label><div style="display:flex;gap:8px"><input type="color" id="sc_c1" value="'+esc(s.c1)+'" style="height:38px;width:50%"><input type="color" id="sc_c2" value="'+esc(s.c2)+'" style="height:38px;width:50%"></div></div>' +
      fld('Products — English (one per line)', '<textarea id="sc_prodEn">'+esc(lines(s.products.en))+'</textarea>', true) +
      fld('Products — Arabic (one per line)', '<textarea id="sc_prodAr" dir="rtl">'+esc(lines(s.products.ar))+'</textarea>', true) +
      fld('Capabilities — English (one per line)', '<textarea id="sc_capEn">'+esc(lines(s.caps.en))+'</textarea>', true) +
      fld('Capabilities — Arabic (one per line)', '<textarea id="sc_capAr" dir="rtl">'+esc(lines(s.caps.ar))+'</textarea>', true) +
    '</div>' +
    '<p class="muted" style="margin-top:10px">Tip: keep the English and Arabic lists in the same order so they line up.</p>',
    'saveSector('+i+')');
}
function saveSector(i) {
  var isNew = i < 0;
  var id = document.getElementById('sc_id').value.trim().toLowerCase().replace(/\s+/g,'-');
  var en = document.getElementById('sc_en').value.trim();
  var ar = document.getElementById('sc_ar').value.trim();
  if (!id || !en || !ar) { alert('Please fill in the ID and both names.'); return; }
  if (isNew && DATA.industries.some(function(x){return x.id===id;})) { alert('A sector with that ID already exists.'); return; }
  var obj = {
    id: isNew ? id : DATA.industries[i].id,
    en: en, ar: ar,
    iconKey: document.getElementById('sc_icon').value,
    c1: document.getElementById('sc_c1').value,
    c2: document.getElementById('sc_c2').value,
    code: document.getElementById('sc_code').value.trim() || id.slice(0,3).toUpperCase(),
    products: { en: toLines(document.getElementById('sc_prodEn').value), ar: toLines(document.getElementById('sc_prodAr').value) },
    caps: { en: toLines(document.getElementById('sc_capEn').value), ar: toLines(document.getElementById('sc_capAr').value) },
    services: isNew ? { en: [], ar: [] } : (DATA.industries[i].services || { en: [], ar: [] })
  };
  if (isNew) DATA.industries.push(obj); else DATA.industries[i] = obj;
  saveData(); closeModal(); renderTab();
}
function deleteSector(i) {
  var s = DATA.industries[i];
  var count = DATA.factories.filter(function(f){return f.industry===s.id;}).length;
  var msg = 'Delete sector "'+s.en+'"?';
  if (count) msg += '\n\n'+count+' factory(ies) use this sector and will need reassigning.';
  if (!confirm(msg)) return;
  DATA.industries.splice(i,1); saveData(); renderTab();
}

/* ---------- Search & Filters ---------- */
function renderConfig() {
  var searchFields = [
    ['name','Factory name'], ['sector','Sector name'], ['governorate','Governorate'],
    ['products','Products'], ['capabilities','Capabilities'], ['description','Description'], ['keywords','Custom keywords/tags']
  ];
  var filterToggles = [
    ['industry','Sector filter'], ['gov','Governorate filter'], ['moq','Max. MOQ filter'],
    ['cert','Certification filter'], ['capacity','Min. capacity filter'], ['exp','Exports-only filter']
  ];
  var certPills = DATA.certs.map(function(c,ix){ return '<span class="pill">'+esc(c)+'<button onclick="removeCert('+ix+')" title="Remove">✕</button></span>'; }).join('');
  var govPills = DATA.govs.map(function(g,ix){ return '<span class="pill">'+esc(g.en)+' / <span dir="rtl">'+esc(g.ar)+'</span><button onclick="removeGov('+ix+')" title="Remove">✕</button></span>'; }).join('');

  document.getElementById('tabBody').innerHTML =
    '<div class="panel-card">' +
      '<h2>Search engine</h2><div class="hint">Choose which fields the search box looks in when someone types a keyword.</div>' +
      '<div class="check-list">' + searchFields.map(function(f){ var on = DATA.search.fields.indexOf(f[0])>=0; return '<label><input type="checkbox" class="scfield" value="'+f[0]+'"'+(on?' checked':'')+'> '+f[1]+'</label>'; }).join('') + '</div>' +
    '</div>' +
    '<div class="panel-card">' +
      '<h2>Which filters appear</h2><div class="hint">Turn the filters on the factories page on or off.</div>' +
      '<div class="check-list">' + filterToggles.map(function(f){ var on = DATA.filters[f[0]]!==false; return '<label><input type="checkbox" class="flt" value="'+f[0]+'"'+(on?' checked':'')+'> '+f[1]+'</label>'; }).join('') + '</div>' +
    '</div>' +
    '<div class="panel-card">' +
      '<h2>Certifications (filter options)</h2><div class="hint">These appear in the certification filter and can be assigned to factories.</div>' +
      '<div class="pill-list">'+(certPills||'<span class="muted">None yet.</span>')+'</div>' +
      '<div class="inline-add"><div class="fld"><input type="text" id="newCert" placeholder="e.g. ISO 45001"></div><button class="btn btn-ghost btn-sm" onclick="addCert()">Add certification</button></div>' +
    '</div>' +
    '<div class="panel-card">' +
      '<h2>Governorates (filter options)</h2><div class="hint">These appear in the governorate filter and factory forms.</div>' +
      '<div class="pill-list">'+(govPills||'<span class="muted">None yet.</span>')+'</div>' +
      '<div class="inline-add"><div class="fld"><label>English</label><input type="text" id="newGovEn" placeholder="e.g. Aswan"></div><div class="fld"><label>Arabic</label><input type="text" id="newGovAr" dir="rtl" placeholder="أسوان"></div><button class="btn btn-ghost btn-sm" onclick="addGov()">Add governorate</button></div>' +
    '</div>' +
    '<div class="save-bar"><button class="btn btn-primary" onclick="saveConfig()">Save search &amp; filter settings</button></div>';
}
function saveConfig() {
  var fields = [];
  document.querySelectorAll('.scfield:checked').forEach(function(c){ fields.push(c.value); });
  DATA.search.fields = fields;
  var filters = {};
  document.querySelectorAll('.flt').forEach(function(c){ filters[c.value] = c.checked; });
  DATA.filters = filters;
  saveData();
}
function addCert() {
  var v = document.getElementById('newCert').value.trim();
  if (!v) return;
  if (DATA.certs.indexOf(v) < 0) DATA.certs.push(v);
  saveData(); renderTab();
}
function removeCert(ix) { DATA.certs.splice(ix,1); saveData(); renderTab(); }
function addGov() {
  var en = document.getElementById('newGovEn').value.trim();
  var ar = document.getElementById('newGovAr').value.trim();
  if (!en) return;
  DATA.govs.push({ en: en, ar: ar || en });
  saveData(); renderTab();
}
function removeGov(ix) {
  if (!confirm('Remove this governorate? Factories set to it will fall back to the first one.')) return;
  DATA.govs.splice(ix,1);
  DATA.factories.forEach(function(f){ if (f.govIndex >= DATA.govs.length) f.govIndex = 0; });
  saveData(); renderTab();
}

/* ---------- Data & Backup ---------- */
function renderDataTab() {
  document.getElementById('tabBody').innerHTML =
    '<div class="panel-card">' +
      '<h2>Your changes are live</h2>' +
      '<div class="hint" style="margin:0">Every time you Save, your edits go straight to the Supabase database and are <b>immediately live for everyone</b> — no commits or exports needed. The Export/Import below is just for keeping your own backups.</div>' +
    '</div>' +
    '<div class="panel-card">' +
      '<h2>Backup</h2>' +
      '<div class="hint">Download a copy of all your data, or restore from a backup file (restoring saves it live too).</div>' +
      '<div style="display:flex;gap:10px;flex-wrap:wrap">' +
        '<button class="btn btn-primary btn-sm" onclick="exportData()">⬇ Export backup (.json)</button>' +
        '<label class="btn btn-ghost btn-sm" style="cursor:pointer">⬆ Import backup<input type="file" accept="application/json" style="display:none" onchange="importData(this)"></label>' +
      '</div>' +
    '</div>' +
    '<div class="panel-card">' +
      '<h2 class="danger">Reset</h2>' +
      '<div class="hint">Replace the live data with the original built-in factories and sectors. This overwrites everyone\'s view — use with care.</div>' +
      '<button class="btn btn-sm btn-danger" onclick="resetData()">Reset to default data</button>' +
    '</div>';
}
function exportData() {
  var blob = new Blob([JSON.stringify(DATA, null, 2)], { type: 'application/json' });
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'sonna-data.json';
  a.click();
  URL.revokeObjectURL(a.href);
}
function importData(input) {
  var file = input.files[0]; if (!file) return;
  var reader = new FileReader();
  reader.onload = function(e){
    try {
      var d = JSON.parse(e.target.result);
      if (!d.factories || !d.industries) throw new Error('bad file');
      DATA = d; TAB='factories'; renderApp(); saveData();
    } catch(err){ alert('That file could not be read as Sonnaع data.'); }
  };
  reader.readAsText(file);
}
function resetData() {
  if (!confirm('Reset the LIVE data to the original built-in factories and sectors? This overwrites everyone\'s view.')) return;
  DATA = AdminStore.defaults();
  TAB = 'factories'; renderApp(); saveData();
}

/* ---------- Modal + field helpers ---------- */
function fld(label, input, full) { return '<div class="fld'+(full?' full':'')+'"><label>'+label+'</label>'+input+'</div>'; }
function openModal(title, bodyHTML, onSave) {
  var ov = document.createElement('div');
  ov.className = 'overlay'; ov.id = 'modal';
  ov.innerHTML =
    '<div class="modal-box">' +
      '<h2>'+title+'</h2>' +
      bodyHTML +
      '<div class="modal-foot">' +
        '<button class="btn btn-ghost" onclick="closeModal()">Cancel</button>' +
        '<button class="btn btn-primary" id="modalSave">Save</button>' +
      '</div>' +
    '</div>';
  ov.addEventListener('click', function(e){ if (e.target === ov) closeModal(); });
  document.body.appendChild(ov);
  document.getElementById('modalSave').setAttribute('onclick', onSave);
}
function closeModal() { var m = document.getElementById('modal'); if (m) m.remove(); }

/* ---------- Start ---------- */
if (tokenValid()) boot(); else renderLogin();
</script>
</body>
